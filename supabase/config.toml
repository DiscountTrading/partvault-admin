# Supabase project config.
# project_id is the project ref (from https://mtpektsxaklhedknincs.supabase.co).
project_id = "mtpektsxaklhedknincs"

# The ebay-import function is called from the browser without a Supabase JWT
# (it does its own storeId-scoped authorization internally). JWT verification
# MUST stay off, or the gateway rejects those calls with
# UNAUTHORIZED_NO_AUTH_HEADER before they reach the function code.
[functions.ebay-import]
verify_jwt = false

# admin-users does its own auth (verifies the caller's JWT + manage_users in
# code), and JWT-at-gateway would reject the browser's CORS preflight. Off.
[functions.admin-users]
verify_jwt = false
