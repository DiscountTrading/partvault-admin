name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger / re-run from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments so two pushes never race the single Pages environment
# (the usual trigger for "Deployment failed, try again later"). cancel-in-progress
# is false so queued runs still deploy rather than being dropped.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      # GitHub Pages intermittently returns "Deployment failed, try again later"
      # even when the build + artifact are fine, and the blip can outlast a single
      # short retry. Try up to 3 times with 30s then 60s backoff; only the final
      # attempt is allowed to fail the run, so a genuine outage still surfaces.
      - name: Deploy to GitHub Pages (attempt 1)
        id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before retry (30s)
        if: steps.d1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before final retry (60s)
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages (final attempt)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
