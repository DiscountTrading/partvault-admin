// ─── SUPABASE STORAGE UPLOAD ─────────────────────────────────
async function uploadToStorage(base64DataUrl,bucket,path){
  const base64=base64DataUrl.split(',')[1];
  const mime=base64DataUrl.split(';')[0].split(':')[1];
  const byteString=atob(base64);
  const ab=new ArrayBuffer(byteString.length);
  const ia=new Uint8Array(ab);
  for(let i=0;i<byteString.length;i++)ia[i]=byteString.charCodeAt(i);
  const blob=new Blob([ab],{type:mime});
  const{data,error}=await sb.storage.from(bucket).upload(path,blob,{upsert:true,contentType:mime});
  if(error)throw error;
  const{data:{publicUrl}}=sb.storage.from(bucket).getPublicUrl(path);
  return publicUrl;
}

function downloadCSV(csvContent,filename){
  const uri='data:text/csv;charset=utf-8,'+encodeURIComponent(csvContent);
  const a=document.createElement('a');a.setAttribute('href',uri);a.setAttribute('download',filename);
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function generateCSV(parts,siteImgUrls){
  siteImgUrls=siteImgUrls||[];
  const COND={'Used - Excellent':'3000','Used - Good':'3000','Used - Fair':'5000','For Parts Only':'7000','Refurbished':'2500'};
  const h='Action,SiteID,Currency,StartPrice,Title,Description,Category,ConditionID,PicURL,PicURL2,PicURL3,PicURL4,Format,Duration,Quantity,ShippingType,ShippingService-1:Option,ShippingService-1:Cost,DispatchTimeMax,ReturnsAcceptedOption,CustomLabel,MPN,Make,Model,Year';

  const rows=parts.map(p=>{

    while(allPhotos.length<4)allPhotos.push('');
    const isFree=p.shippingOption==='Free Postage',isCollect=p.shippingOption==='Collect Only';
    return['Add','15','AUD',p.listPrice,sf(p.title),sf(p.description||''),p.ebayCategoryId||'6030',COND[p.condition]||'3000',...allPhotos,'FixedPrice','GTC','1',isFree?'Free':'Flat',p.shippingOption,isFree||isCollect?0:p.costs&&p.costs.postage||0,'1','ReturnsAccepted',p.localId,p.partNumber||'',p.make,p.model,p.year].join(',');
  });
  return[h,...rows].join('\n');
}

function compressImage(file,callback){
  const img=new window.Image();const url=URL.createObjectURL(file);
  img.onload=()=>{const canvas=document.createElement('canvas');const MAX=1200;const ratio=Math.min(MAX/img.width,MAX/img.height,1);canvas.width=img.width*ratio;canvas.height=img.height*ratio;canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);callback(canvas.toDataURL('image/jpeg',0.82));URL.revokeObjectURL(url);};
  img.src=url;
}

// ─── AUTH ────────────────────────────────────────────────────
function AuthScreen({T,S}){
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[mode,setMode]=useState('login');
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState('');
  const[otpSent,setOtpSent]=useState(false);
  const[otp,setOtp]=useState('');
  const[verifying,setVerifying]=useState(false);

  const sendOtp=async()=>{
    if(!email){setErr('Enter your email');return;}
    setLoading(true);setErr('');
    const{error}=await sb.auth.signInWithOtp({email,options:{shouldCreateUser:false}});
    if(error)setErr(error.message);else setOtpSent(true);
    setLoading(false);
  };

  const verifyOtp=async()=>{
    if(!otp||otp.length<6){setErr('Enter the 6-digit code');return;}
    setVerifying(true);setErr('');
    const{error}=await sb.auth.verifyOtp({email,token:otp,type:'email'});
    if(error)setErr(error.message);
    setVerifying(false);
  };

  const login=async()=>{
    if(!email||!pass){setErr('Enter email and password');return;}
    setLoading(true);setErr('');
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)setErr(error.message);
    setLoading(false);
  };

  const signup=async()=>{
    if(!email||!pass){setErr('Fill all fields');return;}
    setLoading(true);setErr('');
    try{
      const{data,error}=await sb.auth.signUp({email,password:pass});
      if(error)throw error;
      setErr('Account created! Check your email to verify, then sign in.');
      setMode('login');
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  if(otpSent)return(
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,background:T.bg,minHeight:'100vh',textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:16}}>📧</div>
      <div style={{fontSize:22,fontWeight:800,color:T.text,marginBottom:8}}>Check your email</div>
      <div style={{fontSize:14,color:T.muted,marginBottom:24,lineHeight:1.7}}>We sent a <strong style={{color:T.text}}>6-digit code</strong> to <strong style={{color:T.text}}>{email}</strong>. Enter it below — no need to leave the app.</div>
      <div style={{width:'100%',maxWidth:340,display:'flex',flexDirection:'column',gap:12}}>
        <input
          style={{...S.input,fontSize:32,fontWeight:800,letterSpacing:12,textAlign:'center',padding:'16px 14px'}}
          type="number" inputMode="numeric" pattern="[0-9]*" maxLength={6}
          value={otp} onChange={e=>setOtp(e.target.value.slice(0,6))}
          placeholder="000000" autoComplete="one-time-code" autoFocus
        />
        {err&&<div style={{color:C.red,fontSize:13,background:'#fef2f2',padding:12,borderRadius:10}}>{err}</div>}
        <button style={S.btn(C.green)} onClick={verifyOtp} disabled={verifying||otp.length<6}>
          {verifying?'Verifying...':'✓ Verify Code'}
        </button>
        <button onClick={()=>{setOtpSent(false);setOtp('');setErr('');}} style={{background:'none',border:'none',color:T.muted,fontSize:14,padding:'8px 0'}}>← Back</button>
        <button onClick={sendOtp} style={{background:'none',border:'none',color:C.accent,fontSize:14,fontWeight:600}}>Resend code</button>
      </div>
    </div>
  );

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,background:T.bg,minHeight:'100vh'}}>
      <div style={{fontSize:56,marginBottom:8}}>⚙</div>
      <div style={{fontSize:28,fontWeight:800,color:C.accent,marginBottom:4}}>PartVault</div>
      <div style={{fontSize:13,color:T.muted,marginBottom:32}}>Australian Car Parts Manager</div>
      <div style={{width:'100%',maxWidth:380,display:'flex',flexDirection:'column',gap:12}}>
        <input style={S.input} type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" autoComplete="email"/>
        <button style={S.btn(C.purple)} onClick={sendOtp} disabled={loading}>{loading?'Sending...':'✉️ Send 6-Digit Code'}</button>
        <div style={{textAlign:'center',fontSize:12,color:T.muted}}>— or sign in with password —</div>
        {mode==='login'?(
          <>
            <input style={S.input} type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" autoComplete="current-password"/>
            {err&&<div style={{color:C.red,fontSize:13,background:'#fef2f2',padding:12,borderRadius:10}}>{err}</div>}
            <button style={S.btn()} onClick={login} disabled={loading}>{loading?'Signing in...':'Sign In with Password'}</button>
            <button onClick={()=>{setMode('signup');setErr('');}} style={{background:'none',border:'none',color:C.accent,fontSize:14,fontWeight:600}}>No account? Sign Up</button>
          </>
        ):(
          <>
            <input style={S.input} type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password (min 6 chars)"/>
            {err&&<div style={{color:err.includes('created')?C.green:C.red,fontSize:13,background:err.includes('created')?'#f0fdf4':'#fef2f2',padding:12,borderRadius:10}}>{err}</div>}

          </>
        )}

      <div style={{fontSize:11,color:T.muted,marginTop:24}}>Same login as web admin · v{APP_VERSION}</div>

    await sb.from('cars').update({deleted_at:now,status:'deleted'}).eq('id',car.id);
    await sb.from('parts').update({deleted_at:now,status:'Deleted'}).eq('car_id',car.id);
    setCars(cs=>cs.filter(c=>c.id!==car.id));setDelTarget(null);
  };

  const carStats=car=>{
    const parts=car.parts||[];
    const total=parts.length;
    const inStock=parts.filter(p=>p.status==='In Stock').length;
    const listed=parts.filter(p=>p.status==='Listed').length;
    const sold=parts.filter(p=>p.status==='Sold').length;
    const stockVal=parts.filter(p=>p.status!=='Sold').reduce((a,p)=>a+(+p.list_price||0),0);
    return{total,inStock,listed,sold,stockVal};
  };

  if(showMakes)return(
    <div style={{background:T.bg,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div style={S.nav}>
        <button style={S.navBtn} onClick={()=>setShowMakes(false)}>Done</button>
        <span style={S.navTitle}>Select Make</span>
        <div style={{width:56}}/>
      </div>
      <div className="screen" style={{background:T.bg}}>
        {MAKES.map(m=>(
          <div key={m} onClick={()=>{setNewCar(c=>({...c,make:m,model:''}));setShowMakes(false);}} style={{padding:'16px 20px',borderBottom:'1px solid '+T.border,display:'flex',justifyContent:'space-between',background:T.card,cursor:'pointer'}}>
            <span style={{fontSize:16,color:m===newCar.make?C.accent:T.text,fontWeight:m===newCar.make?700:400}}>{m}</span>
            {m===newCar.make&&<span style={{color:C.accent}}>✓</span>}
          </div>
        ))}
      </div>
    </div>
  );

  if(showAddForm)return(
    <div style={{background:T.bg,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div style={S.nav}>
        <button style={S.navBtn} onClick={()=>setShowAddForm(false)}>← Cancel</button>
        <span style={S.navTitle}>Add Car</span>
        <button style={{...S.navBtn,background:C.green}} onClick={addCar} disabled={saving}>{saving?'Saving...':'Save'}</button>
      </div>
      <div className="screen" style={{padding:16,background:T.bg}}>
        <div style={S.card}>
          <div style={S.cardTitle}>Vehicle Details</div>
          <label style={S.label}>Make *</label>
          <button onClick={()=>setShowMakes(true)} style={{...S.select,textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,color:newCar.make?T.text:T.muted}}>
            <span>{newCar.make||'Select Make'}</span><span>›</span>
          </button>
          <label style={S.label}>Model</label>
          <div style={{position:'relative',marginBottom:12}}>
            <input style={S.input} value={newCar.model} onChange={e=>{setNewCar(c=>({...c,model:e.target.value}));if(newCar.make&&MODEL_SUGS[newCar.make]){const q=e.target.value.toLowerCase();setModelSugs(q?MODEL_SUGS[newCar.make].filter(m=>m.toLowerCase().includes(q)):MODEL_SUGS[newCar.make]);}else setModelSugs([]);}} onFocus={()=>{if(newCar.make&&MODEL_SUGS[newCar.make])setModelSugs(MODEL_SUGS[newCar.make]);}} onBlur={()=>setTimeout(()=>setModelSugs([]),200)} placeholder="Model" autoComplete="off"/>
            {modelSugs.length>0&&(
              <div style={{position:'absolute',top:'100%',left:0,right:0,background:T.card,borderRadius:10,border:'1.5px solid '+C.accent,zIndex:100,boxShadow:'0 4px 20px rgba(0,0,0,0.15)',overflow:'hidden',marginTop:2,maxHeight:200,overflowY:'auto'}}>
                {modelSugs.map(m=><div key={m} onMouseDown={()=>{setNewCar(c=>({...c,model:m}));setModelSugs([]);}} style={{padding:'11px 14px',borderBottom:'1px solid '+T.border,fontSize:14,color:T.text,cursor:'pointer'}}>{m}</div>)}
              </div>
            )}
          </div>
          <label style={S.label}>Year</label>
          <input style={{...S.input,marginBottom:12}} value={newCar.year} onChange={e=>setNewCar(c=>({...c,year:e.target.value}))} placeholder="e.g. 2018"/>
        </div>
        <div style={S.card}>
          <div style={S.cardTitle}>Purchase Details</div>
          <label style={S.label}>Purchase Price ($)</label>
          <input style={{...S.input,marginBottom:12}} type="number" value={newCar.purchase_price} onChange={e=>setNewCar(c=>({...c,purchase_price:e.target.value}))} placeholder="0"/>
          <label style={S.label}>Purchase Date</label>
          <input style={{...S.input,marginBottom:12}} type="date" value={newCar.purchase_date} onChange={e=>setNewCar(c=>({...c,purchase_date:e.target.value}))}/>
          <label style={S.label}>Notes</label>
          <textarea style={S.textarea} value={newCar.notes} onChange={e=>setNewCar(c=>({...c,notes:e.target.value}))} placeholder="Condition, source, any notes..." rows={3}/>
        </div>
        <div style={S.card}>
          <div style={S.cardTitle}>Car Photos <span style={{fontSize:12,color:T.muted,fontWeight:400}}>(attached to all parts)</span></div>
          <input ref={carPhotoRef} type="file" accept="image/*" multiple onChange={handleCarPhoto}/>
          {carPhotos.length>0&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
              {carPhotos.map((p,i)=>(
                <div key={i} style={{position:'relative',width:72,height:72}}>
                  <img src={p} style={{width:72,height:72,borderRadius:8,objectFit:'cover'}}/>
                  <button onClick={()=>setCarPhotos(ps=>ps.filter((_,j)=>j!==i))} style={{position:'absolute',top:-6,right:-6,background:C.red,border:'none',color:'#fff',borderRadius:'50%',width:20,height:20,fontSize:10,fontWeight:700,padding:0,lineHeight:'20px'}}>x</button>
                </div>
              ))}
            </div>
          )}
          <button onClick={()=>carPhotoRef.current.click()} style={{...S.btn(T.navBg),padding:'11px 16px',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            📷 {carPhotos.length===0?'Add Car Photos':'Add More'}
          </button>
          <div style={{fontSize:11,color:T.muted,marginTop:8}}>{carPhotos.length}/6 photos · Will upload to cloud on save</div>
        </div>
        <button style={{...S.btn(),marginBottom:8}} onClick={addCar} disabled={saving}>{saving?'Saving...':'Add Car'}</button>
        <div style={{height:20}}/>
      </div>
    </div>
  );

  return(
    <div className="screen" style={{padding:16,background:T.bg}}>
      {/* Delete car confirmation */}
      {delTarget&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:999,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>
          <div style={{...S.card,maxWidth:380,width:'100%',border:'2px solid '+C.red}}>
            <div style={{fontSize:28,textAlign:'center',marginBottom:8}}>⚠️⚠️⚠️</div>
            <div style={{fontWeight:700,fontSize:16,color:T.text,marginBottom:8,textAlign:'center'}}>Delete this car?</div>
            <div style={{background:'#fef2f2',borderRadius:10,padding:14,marginBottom:16,fontSize:14,color:C.red,lineHeight:1.7}}>
              <strong>{carLabel(delTarget)}</strong><br/>
              This will soft-delete this car and all <strong>{(delTarget.parts||[]).length} part{(delTarget.parts||[]).length!==1?'s':''}</strong>. They will be hidden but not permanently removed.
            </div>
            <div style={{display:'flex',gap:10}}>
              <button style={{...S.btn(T.muted,true),flex:1,padding:'12px 0'}} onClick={()=>setDelTarget(null)}>Cancel</button>
              <button style={{...S.btn(C.red),flex:1,padding:'12px 0'}} onClick={()=>deleteCar(delTarget)}>Delete Car + Parts</button>
            </div>
          </div>
        </div>
      )}

      <button style={{...S.btn(),marginBottom:12}} onClick={()=>setShowAddForm(true)}>🚗 Add New Car</button>

      {/* Filter toggle */}
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button onClick={()=>setShowAll(false)} style={{flex:1,padding:'10px 8px',borderRadius:10,border:'2px solid '+(!showAll?C.accent:T.border),background:!showAll?'#fff4ef':T.card,color:!showAll?C.accent:T.muted,fontWeight:700,fontSize:13}}>Active Parts Only</button>
        <button onClick={()=>setShowAll(true)} style={{flex:1,padding:'10px 8px',borderRadius:10,border:'2px solid '+(showAll?C.accent:T.border),background:showAll?'#fff4ef':T.card,color:showAll?C.accent:T.muted,fontWeight:700,fontSize:13}}>All Cars</button>
      </div>

      {loading&&<div style={{textAlign:'center',color:T.muted,padding:40}}><span className="spin">⚙</span> Loading...</div>}
      {!loading&&visibleCars.length===0&&(
        <div style={{textAlign:'center',padding:'60px 0',color:T.muted}}>
          <div style={{fontSize:56,marginBottom:16}}>🚗</div>
          <div style={{fontWeight:700,fontSize:17,color:T.text,marginBottom:8}}>{showAll?'No cars yet':'No active cars'}</div>
          <div style={{fontSize:14}}>{showAll?'Tap Add New Car to start':'Switch to "All Cars" to see sold out vehicles'}</div>
        </div>
      )}
      {visibleCars.map(car=>{
        const{total,inStock,listed,sold,stockVal}=carStats(car);
        return(
          <div key={car.id} style={S.card}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:17,color:T.text,marginBottom:2}}>{carLabel(car)}</div>
                <div style={{fontSize:12,color:T.muted}}>{car.purchase_date?new Date(car.purchase_date).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):''}{car.purchase_price?' · Paid '+fmt(car.purchase_price):''}</div>
                {car.notes&&<div style={{fontSize:12,color:T.muted,marginTop:4,fontStyle:'italic'}}>{car.notes}</div>}
              </div>
              <button onClick={()=>setDelTarget(car)} style={{...S.btnSm(C.red),background:'#fef2f2',color:C.red,border:'1px solid #fca5a5',fontSize:11,padding:'5px 10px',flexShrink:0,marginLeft:8}}>🗑 Delete</button>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
              {[['Parts',total,T.muted],['In Stock',inStock,C.blue],['Listed',listed,C.accent],['Sold',sold,C.green]].map(([l,v,col])=>(
                <div key={l} style={{background:T.panel,borderRadius:8,padding:'6px 12px',textAlign:'center'}}>
                  <div style={{fontSize:16,fontWeight:800,color:col}}>{v}</div>
                  <div style={{fontSize:10,color:T.muted,fontWeight:600}}>{l}</div>
                </div>
              ))}
              <div style={{background:T.panel,borderRadius:8,padding:'6px 12px',textAlign:'center'}}>
                <div style={{fontSize:16,fontWeight:800,color:C.blue}}>{fmt(stockVal)}</div>
                <div style={{fontSize:10,color:T.muted,fontWeight:600}}>Stock Val</div>

            <button style={{...S.btn(T.navBg),padding:'12px 16px',fontSize:14}} onClick={()=>onOpenCar(car)}>

            </button>
          </div>
        );
      })}
    </div>
  );
}

function PartForm({part,car,onSave,onCancel,T,S,isAI,isEdit}){
  const[f,setF]=useState(()=>({
    localId:part?.localId||part?.id||uid(),
    car_id:car?.id||part?.car_id||null,
    make:car?.make||part?.make||'',
    model:car?.model||part?.model||'',
    year:car?.year||part?.year||'',
    photos:part?.photos||[],
    uploadedPhotos:part?.uploadedPhotos||part?.photos||[],
    title:part?.title||'',
    category:part?.category||CAT_NAMES[0],
    subcategory:part?.subcategory||EBAY_CATS[CAT_NAMES[0]][0],
    ebayCategoryId:part?.ebayCategoryId||part?.ebay_category_id||CAT_IDS[CAT_NAMES[0]]||'6030',
    condition:part?.condition||'Used - Good',
    description:part?.description||'',
    partNumber:part?.partNumber||part?.part_number||'',
    keywords:part?.keywords||loadSettings().defaultKeywords||'',
    listPrice:part?.listPrice||part?.list_price||0,
    weight:part?.weight||0,
    shippingOption:part?.shippingOption||part?.shipping_option||'Standard Post',
    costs:part?.costs||defCosts('medium'),
    aiConfidence:part?.aiConfidence||'',
    aiNotes:part?.aiNotes||'',
    syncStatus:part?.syncStatus||'pending',
    status:part?.status||'In Stock',
  }));
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const setCost=(k,v)=>setF(p=>({...p,costs:{...p.costs,[k]:+v||0}}));
  const tc=Object.values(f.costs||{}).reduce((a,v)=>a+(+v||0),0);
  const profit=(f.listPrice||0)-tc;
  const confC={high:C.green,medium:C.yellow,low:C.red};
  return(
    <div style={{background:T.bg,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div style={S.nav}>
        <button style={S.navBtn} onClick={onCancel}>← Back</button>
        <span style={S.navTitle}>{isEdit?'Edit Part':isAI?'Review AI Part':'Manual Entry'}</span>
        <button style={{...S.navBtn,background:C.green}} onClick={()=>onSave(f)}>Save</button>
      </div>
      <div className="screen" style={{padding:16,background:T.bg}}>
        {isAI&&f.aiConfidence&&(
          <div style={{background:'#f0fdf4',border:'1.5px solid '+C.green,borderRadius:12,padding:14,marginBottom:16,display:'flex',gap:12}}>
            <span style={{fontSize:24}}>✨</span>
            <div><div style={{fontWeight:700,color:C.green,fontSize:14,marginBottom:3}}>AI filled this form <span style={{...S.pill(confC[f.aiConfidence]||C.yellow),marginLeft:8,fontSize:10}}>{f.aiConfidence}</span></div>{f.aiNotes&&<div style={{fontSize:12,color:'#166534'}}>{f.aiNotes}</div>}</div>
          </div>
        )}
        {f.photos&&f.photos.length>0&&<div style={{display:'flex',gap:8,marginBottom:16,overflowX:'auto'}}>{f.photos.map((p,i)=><img key={i} src={p} style={{width:80,height:80,borderRadius:8,objectFit:'cover',flexShrink:0}}/>)}</div>}
        <div style={S.card}>
          <div style={S.cardTitle}>Listing Details</div>
          <label style={S.label}>Title ({(f.title||'').length}/80)</label>
          <input style={{...S.input,marginBottom:12}} value={f.title||''} onChange={e=>set('title',e.target.value)}/>
          <label style={S.label}>Category</label>
          <select style={{...S.select,marginBottom:12}} value={f.category||CAT_NAMES[0]} onChange={e=>{set('category',e.target.value);set('ebayCategoryId',CAT_IDS[e.target.value]||'6030');}}>
            {CAT_NAMES.map(c=><option key={c}>{c}</option>)}
          </select>
          <label style={S.label}>Subcategory</label>
          <select style={{...S.select,marginBottom:12}} value={f.subcategory||''} onChange={e=>set('subcategory',e.target.value)}>
            {(EBAY_CATS[f.category]||[]).map(s=><option key={s}>{s}</option>)}
          </select>
          <label style={S.label}>Condition</label>
          <select style={{...S.select,marginBottom:12}} value={f.condition||CONDITIONS[1]} onChange={e=>set('condition',e.target.value)}>
            {CONDITIONS.map(c=><option key={c}>{c}</option>)}
          </select>
          <label style={S.label}>Status</label>
          <select style={{...S.select,marginBottom:12}} value={f.status||'In Stock'} onChange={e=>set('status',e.target.value)}>
            {['In Stock','Listed','Sold','Archived'].map(s=><option key={s}>{s}</option>)}
          </select>
          <label style={S.label}>Description</label>
          <textarea style={{...S.textarea,minHeight:100}} value={f.description||''} onChange={e=>set('description',e.target.value)} rows={4}/>
        </div>
        <div style={S.card}>
          <div style={S.cardTitle}>Vehicle</div>
          <div style={{display:'flex',gap:8}}>
            <input style={{...S.input,flex:1}} value={f.make||''} onChange={e=>set('make',e.target.value)} placeholder="Make"/>
            <input style={{...S.input,flex:1}} value={f.model||''} onChange={e=>set('model',e.target.value)} placeholder="Model"/>
            <input style={{...S.input,flex:0.8}} value={f.year||''} onChange={e=>set('year',e.target.value)} placeholder="Year"/>
          </div>
        </div>
        <div style={S.card}>
          <div style={S.cardTitle}>Pricing & Shipping</div>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <div style={{flex:1}}><label style={S.label}>List Price ($)</label><input style={S.input} type="number" value={f.listPrice||''} onChange={e=>set('listPrice',+e.target.value||0)}/></div>
            <div style={{flex:1}}><label style={S.label}>Weight (kg)</label><input style={S.input} type="number" value={f.weight||''} onChange={e=>set('weight',+e.target.value||0)}/></div>
          </div>
          <label style={S.label}>Shipping</label>
          <select style={S.select} value={f.shippingOption||SHIPPING[0]} onChange={e=>set('shippingOption',e.target.value)}>
            {SHIPPING.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div style={{...S.card,background:T.panel}}>
          <div style={S.cardTitle}>Costs (AUD)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {['acquisition','labour','storage','packaging','postage','holding'].map(k=>(
              <div key={k}><label style={S.label}>{k} ($)</label><input style={S.input} type="number" value={f.costs&&f.costs[k]||0} onChange={e=>setCost(k,e.target.value)}/></div>
            ))}
          </div>
          <div style={{marginTop:12,display:'flex',justifyContent:'space-between',fontSize:14}}>
            <span style={{color:T.muted}}>Cost: <strong style={{color:C.red}}>{fmt(tc)}</strong></span>
            <span style={{color:T.muted}}>Profit: <strong style={{color:profit>=0?C.green:C.red}}>{fmt(profit)}</strong></span>
          </div>
        </div>
        <div style={S.card}>
          <label style={S.label}>OEM Part Number</label>
          <input style={{...S.input,marginBottom:12}} value={f.partNumber||''} onChange={e=>set('partNumber',e.target.value)} placeholder="Optional"/>
          <label style={S.label}>Search Keywords</label>
          <input style={S.input} value={f.keywords||''} onChange={e=>set('keywords',e.target.value)} placeholder="e.g. genuine OEM used spare parts"/>
        </div>
        <button style={{...S.btn(),marginBottom:8}} onClick={()=>onSave(f)}>Save Part</button>
        <button style={S.btn(T.muted,true)} onClick={onCancel}>Cancel</button>
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// ─── CAR SESSION SCREEN ───────────────────────────────────────
function CarScreen({car,profile,onHome,T,S,settings}){
  const[parts,setParts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[photos,setPhotos]=useState([]);
  const[hint,setHint]=useState('');
  const[analysing,setAnalysing]=useState(false);
  const[exporting,setExporting]=useState(false);
  const[exportMsg,setExportMsg]=useState('');
  const[err,setErr]=useState('');
  const[showForm,setShowForm]=useState(false);
  const[draftPart,setDraftPart]=useState(null);
  const[isAIForm,setIsAIForm]=useState(false);
  const[editingPart,setEditingPart]=useState(null);
  const[bulkGenerating,setBulkGenerating]=useState(false);
  const[bulkProgress,setBulkProgress]=useState({done:0,total:0,current:''});
  const[storeFooter,setStoreFooter]=useState(settings.defaultText||'');
  const[aiSettings,setAiSettings]=useState({descriptionLength:'medium',includeYearRange:true,includeSeries:true,includePartNumber:true,includeConditionDetail:true,customPromptNotes:''});
  const libRef=useRef();

  useEffect(()=>{
    if(!car?.id)return;
    sb.from('parts').select('*').eq('car_id',car.id).is('deleted_at',null).order('created_at',{ascending:false})
      .then(({data})=>{setParts(data||[]);setLoading(false);});
  },[car]);

  // Load store footer and AI settings from Supabase
  useEffect(()=>{
    if(!profile?.store_id)return;
    loadStoreSettings(profile.store_id).then(s=>{
      if(s.footer)setStoreFooter(s.footer);
      if(s.aiDescription)setAiSettings(prev=>({...prev,...s.aiDescription}));
    });
  },[profile]);

  const syncToCloud=async(p)=>{
    if(!profile?.store_id)return false;
    try{
      const{data:{user}}=await sb.auth.getUser();
      const{error}=await sb.from('parts').upsert({
        id:p.localId,store_id:profile.store_id,created_by:user?.id,car_id:car.id,
        sku:'SKU-'+p.localId.slice(-6).toUpperCase(),
        title:p.title,category:p.category,subcategory:p.subcategory,
        ebay_category_id:p.ebayCategoryId,make:p.make,model:p.model,year:p.year,
        condition:p.condition,description:p.description,status:p.status||'In Stock',
        sync_status:'synced',costs:p.costs,list_price:p.listPrice,weight:p.weight,
        photos:p.uploadedPhotos||[],part_number:p.partNumber,
        shipping_option:p.shippingOption,notes:'',acquired_date:today(),
        session_id:car.id,deleted_at:null,ai_assessed:false,
      });
      return!error;
    }catch(e){console.warn('Sync failed',e);return false;}
  };

  const handlePhoto=e=>{const files=Array.from(e.target.files||[]);files.slice(0,12-photos.length).forEach(f=>compressImage(f,d=>setPhotos(p=>[...p,d])));e.target.value='';};

  const blankPart=()=>({
    localId:uid(),car_id:car.id,make:car.make,model:car.model,year:car.year,
    photos:photos.slice(0,8),uploadedPhotos:[],
    title:'',category:CAT_NAMES[0],subcategory:EBAY_CATS[CAT_NAMES[0]][0],
    ebayCategoryId:CAT_IDS[CAT_NAMES[0]]||'6030',condition:'Used - Good',
    description:'',partNumber:'',keywords:settings.defaultKeywords||'',
    listPrice:0,weight:0,shippingOption:'Standard Post',
    costs:defCosts('medium'),aiConfidence:'',aiNotes:'',
    syncStatus:'pending',status:'In Stock',createdAt:new Date().toISOString(),
  });

  const handleAI=async()=>{
    if(!photos.length){setErr('Add at least one photo first');return;}
    const apiKey=localStorage.getItem('pv_anthropic_key')||'';
    if(!apiKey||apiKey.length<20){setErr('Add your Anthropic API key in Account tab');return;}
    setAnalysing(true);setErr('');
    const sys='You are an expert Australian used car parts eBay seller. Return JSON only.\nCategories: '+CAT_NAMES.join(', ')+'\nReturn: {"title":"max 80 chars","category":"exact","subcategory":"exact","condition":"Used - Good","description":"3-4 sentences","partNumber":"OEM or empty","sizeTier":"small|medium|large|bulky","listPrice":number,"weight":number,"shippingOption":"Standard Post|Express Post|Courier|Collect Only","confidence":"high|medium|low","notes":"notes"}';
    try{
      const imageData=photos[0].split(',')[1];
      const res=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:sys,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:imageData}},{type:'text',text:'Vehicle: '+car.make+' '+car.model+' '+car.year+'.'+(hint?' Part: '+hint+'.':'')+' Identify this car part.'}]}]})});
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const raw=data.content&&data.content.filter(b=>b.type==='text').map(b=>b.text).join('').trim();
      let parsed;try{parsed=JSON.parse(raw);}catch{const m=raw&&raw.match(/\{[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);}
      if(!parsed)throw new Error('Could not parse AI response');
      setDraftPart({...blankPart(),photos:photos.slice(0,8),title:parsed.title||'',category:parsed.category||CAT_NAMES[0],subcategory:parsed.subcategory||'',ebayCategoryId:CAT_IDS[parsed.category]||'6030',condition:parsed.condition||'Used - Good',description:parsed.description||'',partNumber:parsed.partNumber||'',listPrice:parsed.listPrice||0,weight:parsed.weight||0,shippingOption:parsed.shippingOption||'Standard Post',costs:defCosts(parsed.sizeTier),aiConfidence:parsed.confidence||'medium',aiNotes:parsed.notes||''});
      setIsAIForm(true);setShowForm(true);
    }catch(e){setErr(e.message||'AI analysis failed');}
    setAnalysing(false);
  };

  const buildAIPrompt=part=>{
    const lengthGuide={short:'2-3 sentences covering key facts',medium:'1-2 paragraphs with good detail',long:'comprehensive description with full fitment, condition detail, and part specifics'}[aiSettings.descriptionLength||'medium'];
    return `You are writing an eBay listing description for a used Australian auto part.\nPart: ${part.title||'Unknown'}\nMake: ${part.make||car.make||''}\nModel: ${part.model||car.model||''}\nYear (donor): ${part.year||car.year||''}\nCategory: ${part.category||''} > ${part.subcategory||''}\nCondition: ${part.condition||'Used - Good'}\nOEM Part Number: ${part.part_number||'Not specified'}\n\nWrite a ${lengthGuide}.\nInclude: ${[aiSettings.includeYearRange&&'year range compatibility (research which years this part suits beyond just the donor car year — accuracy is critical)',aiSettings.includeSeries&&'series/badge variant if relevant',aiSettings.includePartNumber&&'OEM part number if known',aiSettings.includeConditionDetail&&'condition detail'].filter(Boolean).join(', ')}.\n${aiSettings.customPromptNotes?'Additional: '+aiSettings.customPromptNotes:''}\nDo NOT include a store footer. Plain text only. Return ONLY the description.`;
  };

  const handleBulkAI=async()=>{
    const apiKey=localStorage.getItem('pv_anthropic_key')||'';
    if(!apiKey||apiKey.length<20){setErr('Add your Anthropic API key in Account tab');return;}
    const pending=parts.filter(p=>!p.ai_assessed);
    if(!pending.length){setErr('All parts already have AI descriptions');return;}
    setBulkGenerating(true);setErr('');
    setBulkProgress({done:0,total:pending.length,current:''});
    for(let i=0;i<pending.length;i++){
      const part=pending[i];
      setBulkProgress({done:i,total:pending.length,current:part.title||'Part'});
      try{
        const res=await fetch(AI_PROXY,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:buildAIPrompt(part)}]})});
        const data=await res.json();
        const desc=data.content?.filter(b=>b.type==='text').map(b=>b.text).join('').trim()||'';
        if(desc){
          await sb.from('parts').update({description:desc,ai_assessed:true}).eq('id',part.id);
          setParts(ps=>ps.map(x=>x.id===part.id?{...x,description:desc,ai_assessed:true}:x));
        }
      }catch(e){console.warn('AI failed for part',part.id,e);}
      await new Promise(r=>setTimeout(r,500));
    }
    setBulkProgress(p=>({...p,done:pending.length,current:''}));
    setBulkGenerating(false);
  };

  const saveDraft=async p=>{
    let desc=p.description||'';
    const footer=storeFooter||(settings.defaultText||'');
    if(footer&&desc)desc+='\n\n'+footer;
    else if(footer)desc=footer;
    if(p.keywords)desc+=(desc?'\n\n':'')+'Keywords: '+p.keywords;
    const toSave={...p,description:desc};
    if(editingPart){
      // Update existing
      const{error}=await sb.from('parts').update({title:toSave.title,category:toSave.category,subcategory:toSave.subcategory,ebay_category_id:toSave.ebayCategoryId,condition:toSave.condition,description:toSave.description,status:toSave.status,costs:toSave.costs,list_price:toSave.listPrice,weight:toSave.weight,part_number:toSave.partNumber,shipping_option:toSave.shippingOption,sync_status:'synced'}).eq('id',editingPart.id);
      if(!error)setParts(ps=>ps.map(x=>x.id===editingPart.id?{...x,...toSave,id:editingPart.id}:x));
      setEditingPart(null);
    }else{
      // Insert new
      const ok=await syncToCloud(toSave);
      if(ok){
        const{data}=await sb.from('parts').select('*').eq('id',toSave.localId).single();
        if(data)setParts(ps=>[data,...ps]);
      }
    }
    setShowForm(false);setDraftPart(null);setPhotos([]);setHint('');setErr('');
  };

  const deletePart=async(p)=>{
    if(!confirm('Delete "'+( p.title||'this part')+'"? It will be soft-deleted.'))return;
    await sb.from('parts').update({deleted_at:new Date().toISOString(),status:'Deleted'}).eq('id',p.id);
    setParts(ps=>ps.filter(x=>x.id!==p.id));
  };

  const exportCSV=async()=>{
    if(!parts.length){setErr('No parts to export');return;}
    setExporting(true);setErr('');
    setExportMsg('Generating CSV...');
    const csvContent=generateCSV(parts.map(p=>({...p,localId:p.id,uploadedPhotos:p.photos||[]})),settings.siteImages||[]);
    const filename='partvault_'+carLabel(car).replace(/\s+/g,'_')+'_'+today()+'.csv';
    try{
      const{data:{user}}=await sb.auth.getUser();
      await sb.from('csv_exports').insert({store_id:profile?.store_id,created_by:user?.id,filename,csv_data:csvContent,part_ids:parts.map(p=>p.id),part_count:parts.length});
    }catch(e){console.warn('Export record failed',e);}
    downloadCSV(csvContent,filename);
    setExporting(false);setExportMsg('');
  };

  if(showForm&&draftPart)return <PartForm part={draftPart} car={car} onSave={saveDraft} onCancel={()=>{setShowForm(false);setDraftPart(null);setEditingPart(null);}} T={T} S={S} isAI={isAIForm} isEdit={!!editingPart}/>;

  const syncedCount=parts.filter(p=>p.sync_status==='synced'||p.sync_status==='csv_exported').length;

  return(
    <div style={{background:T.bg,minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div style={S.nav}>
        <button style={S.navBtn} onClick={onHome}>🏠 Home</button>
        <span style={S.navTitle}>{carLabel(car)}</span>
        <span style={S.navUser}>{parts.length} parts</span>
      </div>
      <div className="screen" style={{padding:16,background:T.bg}}>
        {/* Stats */}
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {[['Synced ☁️',syncedCount,C.green],['Total',parts.length,C.accent]].map(([l,v,col])=>(
            <div key={l} style={{flex:1,background:T.card,borderRadius:12,padding:'10px 6px',textAlign:'center',border:'1px solid '+T.border}}>
              <div style={{fontSize:20,fontWeight:800,color:col}}>{v}</div>
              <div style={{fontSize:9,color:T.muted,fontWeight:600,textTransform:'uppercase'}}>{l}</div>
            </div>
          ))}
        </div>

        {/* Export */}
        {parts.length>0&&(
          <div style={{marginBottom:16}}>
            {exporting?(
              <div style={{background:T.card,borderRadius:14,padding:20,textAlign:'center',border:'1px solid '+T.border}}>
                <div className="spin" style={{fontSize:24,display:'block',marginBottom:8}}>📄</div>
                <div style={{fontSize:14,fontWeight:600,color:T.text}}>{exportMsg||'Working...'}</div>
              </div>
            ):(
              <button style={{...S.btn(C.green),padding:'14px 20px'}} onClick={exportCSV}>
                📥 Export CSV for eBay
              </button>
            )}
          </div>
        )}

        {/* Parts list */}
        {loading&&<div style={{textAlign:'center',color:T.muted,padding:20}}><span className="spin">⚙</span> Loading...</div>}
        {!loading&&parts.length>0&&(
          <div style={{...S.card,marginBottom:16}}>
            <div style={S.cardTitle}>Parts ({parts.length})</div>
            {parts.map(p=>{
              const cost=Object.values(p.costs||{}).reduce((a,v)=>a+v,0);
              const profit=(+p.list_price||0)-cost;
              const stCol={'In Stock':C.blue,'Listed':C.accent,'Sold':C.green,'Archived':T.muted}[p.status]||T.muted;
              return(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderTop:'1px solid '+T.border}}>
                  {p.photos&&p.photos[0]&&<img src={p.photos[0]} style={{width:44,height:44,borderRadius:6,objectFit:'cover',flexShrink:0}}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.title||'Untitled'}</div>
                    <div style={{fontSize:11,color:T.muted}}>{p.subcategory||p.category}</div>
                    <span style={{...S.pill(stCol),fontSize:10,marginTop:2}}>{p.status}</span>
                  </div>
                  <div style={{flexShrink:0,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                    {p.list_price>0&&<div style={{fontSize:13,fontWeight:700,color:C.accent}}>{fmt(p.list_price)}</div>}
                    <div style={{fontSize:11,color:profit>=0?C.green:C.red,fontWeight:600}}>{profit>=0?'+':''}{fmt(profit)}</div>
                    <div style={{display:'flex',gap:4}}>
                      <button onClick={()=>{setEditingPart(p);setDraftPart({...p,localId:p.id,listPrice:p.list_price,partNumber:p.part_number,shippingOption:p.shipping_option,ebayCategoryId:p.ebay_category_id,costs:p.costs||{}});setIsAIForm(false);setShowForm(true);}} style={{background:'none',border:'1px solid '+T.border,borderRadius:6,padding:'3px 8px',fontSize:11,color:T.muted,cursor:'pointer'}}>✏️</button>
                      <button onClick={()=>deletePart(p)} style={{background:'none',border:'1px solid #fca5a5',borderRadius:6,padding:'3px 8px',fontSize:11,color:C.red,cursor:'pointer'}}>🗑</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Part hint */}
        <div style={S.card}>
          <div style={S.cardTitle}>Part Description <span style={{fontSize:12,color:T.muted,fontWeight:400}}>(helps AI)</span></div>
          <input style={S.input} value={hint} onChange={e=>setHint(e.target.value)} placeholder="e.g. front left door mirror, alternator..."/>
        </div>

        {/* Part photos */}
        <div style={S.card}>
          <div style={S.cardTitle}>Part Photos</div>
          <input ref={libRef} type="file" accept="image/*" multiple onChange={handlePhoto}/>
          {photos.length>0&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
              {photos.map((p,i)=>(
                <div key={i} style={{position:'relative',width:80,height:80}}>
                  <img src={p} style={{width:80,height:80,borderRadius:8,objectFit:'cover'}}/>
                  {i===0&&<div style={{position:'absolute',top:3,left:3,background:C.accent,borderRadius:4,padding:'1px 5px',fontSize:8,color:'#fff',fontWeight:800}}>COVER</div>}
                  <button onClick={()=>setPhotos(ps=>ps.filter((_,j)=>j!==i))} style={{position:'absolute',top:-6,right:-6,background:C.red,border:'none',color:'#fff',borderRadius:'50%',width:22,height:22,fontSize:12,fontWeight:700,padding:0,lineHeight:'22px'}}>x</button>
                </div>
              ))}
            </div>
          )}
          <button onClick={()=>libRef.current.click()} style={{...S.btn(T.navBg),padding:'12px 16px',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            📷 {photos.length===0?'Add Photo':'Add More Photos'}
          </button>
          <div style={{fontSize:11,color:T.muted,marginTop:8}}>{photos.length}/12 · First = eBay cover</div>
        </div>

        {/* Bulk AI Generation */}
        {parts.filter(p=>!p.ai_assessed).length>0&&!bulkGenerating&&(
          <div style={{...S.card,background:'#eff6ff',border:'1px solid #bfdbfe',marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14,color:C.blue,marginBottom:4}}>✨ Bulk AI Descriptions</div>
            <div style={{fontSize:12,color:C.muted,marginBottom:12}}>{parts.filter(p=>!p.ai_assessed).length} part{parts.filter(p=>!p.ai_assessed).length!==1?'s':''} need AI descriptions</div>
            <button style={{...S.btn(C.blue),padding:'12px 16px',fontSize:14}} onClick={handleBulkAI}>
              ✨ Generate All Descriptions
            </button>
          </div>
        )}
        {bulkGenerating&&(
          <div style={{...S.card,background:'#eff6ff',border:'1px solid #bfdbfe',marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:14,color:C.blue,marginBottom:8}}>✨ Generating descriptions...</div>
            <div style={{height:6,background:'#dbeafe',borderRadius:3,overflow:'hidden',marginBottom:8}}>
              <div style={{height:'100%',background:C.blue,borderRadius:3,width:bulkProgress.total>0?((bulkProgress.done/bulkProgress.total)*100)+'%':'0%',transition:'width .3s'}}/>
            </div>
            <div style={{fontSize:12,color:C.muted}}>{bulkProgress.done}/{bulkProgress.total} · {bulkProgress.current}</div>
          </div>
        )}

        {err&&<div style={{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',fontSize:13,color:C.red,marginBottom:12}}>{err}</div>}

        {analysing?(
          <div style={{background:T.card,borderRadius:14,padding:24,textAlign:'center',border:'1px solid #e9d5ff',marginBottom:12}}>
            <div className="spin" style={{fontSize:32,display:'block',marginBottom:12}}>✨</div>
            <div style={{fontSize:16,fontWeight:700,color:C.purple}}>AI is analysing...</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:12}}>
            <button style={{...S.btn(C.purple),padding:'16px 20px'}} onClick={handleAI}>
              ✨ Create Part with AI
              <div style={{fontSize:12,fontWeight:400,opacity:0.8,marginTop:2}}>Analyse photo and fill all eBay fields</div>
            </button>
            <button style={{...S.btn(T.navBg),padding:'16px 20px'}} onClick={()=>{setDraftPart(blankPart());setIsAIForm(false);setShowForm(true);}}>
              ✏️ Manual Entry
            </button>
          </div>
        )}
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// ─── PARTS TAB ───────────────────────────────────────────────
function PartsTab({profile,isAdmin,T,S}){
  const[parts,setParts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[viewMode,setViewMode]=useState('parts');
  const[search,setSearch]=useState('');
  const[filterMake,setFilterMake]=useState('');
  const[filterModel,setFilterModel]=useState('');
  const[filterCat,setFilterCat]=useState('');
  const[filterStatus,setFilterStatus]=useState('');
  const[showSold,setShowSold]=useState(false);
  const[editingPart,setEditingPart]=useState(null);
  const[expandedCars,setExpandedCars]=useState(new Set());

  useEffect(()=>{
    if(!profile?.store_id){setLoading(false);return;}
    sb.from('parts').select('*').eq('store_id',profile.store_id).is('deleted_at',null).order('created_at',{ascending:false})
      .then(({data})=>{setParts(data||[]);setLoading(false);});
    const ch=sb.channel('mobile-parts-tab-v2')
      .on('postgres_changes',{event:'*',schema:'public',table:'parts',filter:'store_id=eq.'+profile.store_id},
        ()=>sb.from('parts').select('*').eq('store_id',profile.store_id).is('deleted_at',null).order('created_at',{ascending:false}).then(({data})=>setParts(data||[]))
      ).subscribe();
    return()=>sb.removeChannel(ch);
  },[profile]);

  const makes=useMemo(()=>[...new Set(parts.filter(p=>p.make).map(p=>p.make))].sort(),[parts]);
  const models=useMemo(()=>{
    const src=filterMake?parts.filter(p=>p.make===filterMake):parts;
    return[...new Set(src.filter(p=>p.model).map(p=>p.model))].sort();
  },[parts,filterMake]);

  const filtered=useMemo(()=>parts.filter(p=>{
    if(!showSold&&p.status==='Sold')return false;
    const q=search.toLowerCase();
    if(q&&![p.title,p.make,p.model,p.sku,p.part_number,p.category,p.subcategory,p.condition,p.status].some(v=>(v||'').toLowerCase().includes(q)))return false;
    if(filterMake&&p.make!==filterMake)return false;
    if(filterModel&&p.model!==filterModel)return false;
    if(filterCat&&p.category!==filterCat)return false;
    if(filterStatus&&p.status!==filterStatus)return false;
    return true;
  }),[parts,search,filterMake,filterModel,filterCat,filterStatus,showSold]);

  const carGroups=useMemo(()=>{
    const g={};
    filtered.forEach(p=>{
      const key=(p.make||'Unknown')+'|'+(p.model||'')+'|'+(p.year||'')+'|'+(p.car_id||'');
      if(!g[key])g[key]={make:p.make||'Unknown',model:p.model||'',year:p.year||'',car_id:p.car_id,parts:[]};
      g[key].parts.push(p);
    });
    return Object.values(g).sort((a,b)=>(a.make+a.model).localeCompare(b.make+b.model));
  },[filtered]);

  const SC={'In Stock':C.blue,'Listed':C.accent,'Sold':C.green,'Archived':T.muted};

  if(editingPart){
    const s=makeS(T);
    return <PartForm part={{...editingPart,localId:editingPart.id,listPrice:editingPart.list_price,partNumber:editingPart.part_number,shippingOption:editingPart.shipping_option,ebayCategoryId:editingPart.ebay_category_id,costs:editingPart.costs||{}}} car={{id:editingPart.car_id,make:editingPart.make,model:editingPart.model,year:editingPart.year}} onSave={async f=>{
      await sb.from('parts').update({title:f.title,category:f.category,subcategory:f.subcategory,condition:f.condition,description:f.description,status:f.status,costs:f.costs,list_price:f.listPrice,weight:f.weight,part_number:f.partNumber,shipping_option:f.shippingOption,sync_status:'synced'}).eq('id',editingPart.id);
      setParts(ps=>ps.map(x=>x.id===editingPart.id?{...x,title:f.title,category:f.category,subcategory:f.subcategory,condition:f.condition,description:f.description,status:f.status,costs:f.costs,list_price:f.listPrice,part_number:f.partNumber}:x));
      setEditingPart(null);
    }} onCancel={()=>setEditingPart(null)} T={T} S={s} isEdit={true}/>;
  }

  const selSm={background:T.inputBg,border:'1.5px solid '+T.border,borderRadius:8,padding:'8px 10px',color:T.text,fontSize:13,boxSizing:'border-box'};

  return(
    <div className="screen" style={{padding:16,background:T.bg}}>
      {/* View toggle */}
      <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
        <div style={{display:'flex',borderRadius:8,overflow:'hidden',border:'1.5px solid '+T.border,flex:1}}>
          <button onClick={()=>setViewMode('parts')} style={{flex:1,padding:'8px 0',fontSize:12,fontWeight:600,background:viewMode==='parts'?C.accent:'transparent',color:viewMode==='parts'?'#fff':T.muted,border:'none',cursor:'pointer',fontFamily:'inherit'}}>📦 By Part</button>
          <button onClick={()=>setViewMode('car')} style={{flex:1,padding:'8px 0',fontSize:12,fontWeight:600,background:viewMode==='car'?C.accent:'transparent',color:viewMode==='car'?'#fff':T.muted,border:'none',cursor:'pointer',fontFamily:'inherit',borderLeft:'1px solid '+T.border}}>🚗 By Car</button>
        </div>
        <button onClick={()=>setShowSold(s=>!s)} style={{...S.btnSm(showSold?C.green:T.navBg),fontSize:12,padding:'8px 12px',flexShrink:0}}>{showSold?'✓ Sold':'+ Sold'}</button>
      </div>

      {/* Search & filters */}
      <div style={{...S.card,padding:12,marginBottom:12}}>
        <input style={{...S.input,marginBottom:8}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search all fields..."/>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <select style={{...selSm,flex:1,minWidth:100}} value={filterMake} onChange={e=>{setFilterMake(e.target.value);setFilterModel('');}}>
            <option value="">All Makes</option>
            {makes.map(m=><option key={m}>{m}</option>)}
          </select>
          <select style={{...selSm,flex:1,minWidth:100}} value={filterModel} onChange={e=>setFilterModel(e.target.value)}>
            <option value="">All Models</option>
            {models.map(m=><option key={m}>{m}</option>)}
          </select>
          <select style={{...selSm,flex:1,minWidth:120}} value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
            <option value="">All Categories</option>
            {CAT_NAMES.map(c=><option key={c}>{c}</option>)}
          </select>
          <select style={{...selSm,flex:1,minWidth:100}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option value="">All Statuses</option>
            {['In Stock','Listed','Sold','Archived'].map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        {(search||filterMake||filterModel||filterCat||filterStatus)&&(
          <button onClick={()=>{setSearch('');setFilterMake('');setFilterModel('');setFilterCat('');setFilterStatus('');}} style={{marginTop:8,background:'none',border:'none',color:C.accent,fontSize:13,fontWeight:600,padding:0}}>Clear filters · {filtered.length} results</button>
        )}
      </div>

      {loading&&<div style={{textAlign:'center',color:T.muted,padding:40}}><span className="spin">⚙</span></div>}

      {/* BY PART */}
      {!loading&&viewMode==='parts'&&filtered.map(p=>{
        const cost=Object.values(p.costs||{}).reduce((a,v)=>a+v,0);
        const lp=+p.list_price||0;
        const profit=lp-cost;
        const col=SC[p.status]||T.muted;
        return(
          <div key={p.id} style={{...S.card,marginBottom:8}} onClick={()=>setEditingPart(p)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
              <div style={{flex:1,minWidth:0,marginRight:8}}>
                <div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.title||'Untitled'}</div>
                <div style={{fontSize:11,color:T.muted}}>{p.make} {p.model} {p.year} · {p.subcategory||p.category}</div>
              </div>
              <span style={S.pill(col)}>{p.status}</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:6}}>
              <div style={{fontSize:11,color:T.muted}}>tap to edit ✏️</div>
              <div>
                <span style={{fontSize:15,fontWeight:800,color:T.text}}>{fmt(lp)}</span>
                {isAdmin&&<span style={{fontSize:11,color:profit>=0?C.green:C.red,marginLeft:8,fontWeight:600}}>{profit>=0?'+':''}{fmt(profit)}</span>}
              </div>
            </div>
          </div>
        );
      })}

      {/* BY CAR */}
      {!loading&&viewMode==='car'&&carGroups.map(g=>{
        const key=g.make+'|'+g.model+'|'+g.year+'|'+g.car_id;
        const isOpen=expandedCars.has(key);
        const gList=g.parts.reduce((a,p)=>a+(+p.list_price||0),0);
        const gCost=g.parts.reduce((a,p)=>a+Object.values(p.costs||{}).reduce((b,v)=>b+v,0),0);
        return(
          <div key={key} style={{...S.card,padding:0,overflow:'hidden',marginBottom:8}}>
            <div onClick={()=>setExpandedCars(s=>{const n=new Set(s);n.has(key)?n.delete(key):n.add(key);return n;})} style={{display:'flex',alignItems:'center',padding:'12px 14px',cursor:'pointer',background:T.panel,gap:10}}>
              <span style={{fontSize:16}}>{isOpen?'▼':'▶'}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15,color:T.text}}>{g.make} {g.model} {g.year&&"'"+String(g.year).slice(-2)}</div>
                <div style={{fontSize:11,color:T.muted,marginTop:2}}>{g.parts.length} parts · {fmt(gList)} stock · {fmt(gList-gCost)} profit</div>
              </div>
              <span style={S.pill(C.accent)}>{g.parts.length}</span>
            </div>
            {isOpen&&g.parts.map((p,i)=>{
              const lp=+p.list_price||0;
              const col=SC[p.status]||T.muted;
              return(
                <div key={p.id} onClick={()=>setEditingPart(p)} style={{display:'flex',alignItems:'center',padding:'10px 14px',borderTop:'1px solid '+T.border,background:i%2===0?T.card:'#faf9f7',cursor:'pointer',gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.title||'Untitled'}</div>
                    <div style={{fontSize:11,color:T.muted}}>{p.subcategory||p.category}</div>
                  </div>
                  <span style={{...S.pill(col),fontSize:10}}>{p.status}</span>
                  <span style={{fontSize:13,fontWeight:700,color:T.text,flexShrink:0}}>{fmt(lp)}</span>
                </div>
              );
            })}
          </div>
        );
      })}

      {!loading&&filtered.length===0&&<div style={{textAlign:'center',color:T.muted,padding:40}}>No parts match your filters</div>}
    </div>
  );
}

// ─── CSV HISTORY TAB ─────────────────────────────────────────
function CSVHistoryTab({profile,T,S}){
  const[exports,setExports]=useState([]);
  const[loading,setLoading]=useState(true);
  const[expandedId,setExpandedId]=useState(null);
  const[editingId,setEditingId]=useState(null);
  const[editName,setEditName]=useState('');
  const[msg,setMsg]=useState('');
  const load=useCallback(async()=>{
    if(!profile?.store_id){setLoading(false);return;}
    const{data}=await sb.from('csv_exports').select('*').eq('store_id',profile.store_id).is('deleted_at',null).order('created_at',{ascending:false});
    setExports(data||[]);setLoading(false);
  },[profile]);
  useEffect(()=>{load();},[load]);
  const redownload=ex=>{downloadCSV(ex.csv_data,ex.filename);setMsg('Downloaded: '+ex.filename);setTimeout(()=>setMsg(''),3000);};
  const saveEditName=async ex=>{if(!editName.trim())return;await sb.from('csv_exports').update({filename:editName.trim()}).eq('id',ex.id);setExports(es=>es.map(e=>e.id===ex.id?{...e,filename:editName.trim()}:e));setEditingId(null);setEditName('');};
  const deleteExport=async ex=>{if(!confirm('Delete "'+ex.filename+'"?'))return;await sb.from('csv_exports').update({deleted_at:new Date().toISOString()}).eq('id',ex.id);setExports(es=>es.filter(e=>e.id!==ex.id));};
  return(
    <div className="screen" style={{padding:16,background:T.bg}}>
      <div style={{fontWeight:700,fontSize:17,color:T.text,marginBottom:4}}>CSV Export History</div>
      <div style={{fontSize:13,color:T.muted,marginBottom:16}}>All exports from this store.</div>
      {msg&&<div style={{background:'#f0fdf4',border:'1px solid '+C.green,borderRadius:10,padding:'10px 14px',fontSize:13,color:C.green,marginBottom:12,fontWeight:600}}>{msg}</div>}
      {loading&&<div style={{textAlign:'center',color:T.muted,padding:40}}><span className="spin">⚙</span></div>}
      {!loading&&!exports.length&&<div style={{textAlign:'center',padding:'60px 0',color:T.muted}}><div style={{fontSize:48,marginBottom:12}}>📄</div><div style={{fontWeight:700,fontSize:16,color:T.text,marginBottom:6}}>No exports yet</div></div>}
      {exports.map(ex=>(
        <div key={ex.id} style={{...S.card,marginBottom:10}}>
          {editingId===ex.id?(
            <div>
              <input style={{...S.input,marginBottom:10}} value={editName} onChange={e=>setEditName(e.target.value)}/>
              <div style={{display:'flex',gap:8}}>
                <button style={{...S.btn(C.green),flex:1,padding:'10px 0',fontSize:13}} onClick={()=>saveEditName(ex)}>Save</button>
                <button style={{...S.btn(T.muted,true),flex:1,padding:'10px 0',fontSize:13}} onClick={()=>{setEditingId(null);setEditName('');}}>Cancel</button>
              </div>
            </div>
          ):(
            <>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{flex:1,minWidth:0,marginRight:8}}>
                  <div style={{fontWeight:700,fontSize:13,color:T.text,marginBottom:3,wordBreak:'break-all'}}>{ex.filename}</div>
                  <div style={{fontSize:11,color:T.muted}}>{new Date(ex.created_at).toLocaleString('en-AU',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})} · {ex.part_count} part{ex.part_count!==1?'s':''}</div>
                </div>
                <span style={S.pill(C.green)}>CSV</span>
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <button onClick={()=>redownload(ex)} style={{...S.btnSm(C.blue),fontSize:12,padding:'7px 12px'}}>⬇️ Download</button>
                <button onClick={()=>{setEditingId(ex.id);setEditName(ex.filename);}} style={{...S.btnSm(T.navBg),fontSize:12,padding:'7px 12px'}}>✏️ Rename</button>
                <button onClick={()=>setExpandedId(expandedId===ex.id?null:ex.id)} style={{...S.btnSm(T.panel),color:T.text,fontSize:12,padding:'7px 12px'}}>{expandedId===ex.id?'▲':'▼'} Parts</button>
                <button onClick={()=>deleteExport(ex)} style={{...S.btnSm(C.red),background:'#fef2f2',color:C.red,border:'1px solid #fca5a5',fontSize:12,padding:'7px 12px'}}>🗑</button>
              </div>
              {expandedId===ex.id&&(
                <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid '+T.border}}>
                  <div style={{fontSize:12,color:T.muted,marginBottom:6,fontWeight:600}}>INCLUDED PARTS ({(ex.part_ids||[]).length})</div>
                  {(ex.part_ids||[]).map(id=><div key={id} style={{fontSize:11,color:T.muted,padding:'3px 0',borderTop:'1px solid '+T.border}}>…{id.slice(-14)}</div>)}
                </div>
              )}
            </>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── ACCOUNT TAB ────────────────────────────────────────────
function AccountTab({profile,isAdmin,T,S,themeToggle,dark}){
  const[apiKey,setApiKey]=useState('');
  const[saved,setSaved]=useState(false);
  const[showKey,setShowKey]=useState(false);
  const[settings,setSettings]=useState(loadSettings);
  const[settingsSaved,setSettingsSaved]=useState(false);
  const[storeFooter,setStoreFooter]=useState('');
  const[footerSaved,setFooterSaved]=useState(false);
  const siteImgRef=useRef();
  useEffect(()=>{
    if(!profile?.user_id)return;
    sb.from('profiles').select('anthropic_key').eq('user_id',profile.user_id).single().then(({data})=>{
      if(data?.anthropic_key){setApiKey(data.anthropic_key);localStorage.setItem('pv_anthropic_key',data.anthropic_key);}
      else{const local=localStorage.getItem('pv_anthropic_key')||'';setApiKey(local);if(local)sb.from('profiles').update({anthropic_key:local}).eq('user_id',profile.user_id);}
    });
    if(profile?.store_id){
      loadStoreSettings(profile.store_id).then(s=>{
        setStoreFooter(s.footer||settings.defaultText||'');
      });
    }
  },[profile]);
  const saveKey=async()=>{const t=apiKey.trim();localStorage.setItem('pv_anthropic_key',t);if(profile&&profile.user_id)await sb.from('profiles').update({anthropic_key:t}).eq('user_id',profile.user_id);setSaved(true);setTimeout(()=>setSaved(false),2500);};
  const signOut=()=>{if(confirm('Sign out?'))sb.auth.signOut().then(()=>window.location.reload());};
  const handleSiteImg=e=>{Array.from(e.target.files||[]).forEach(f=>compressImage(f,d=>{const ns={...settings,siteImages:[...(settings.siteImages||[]),d]};setSettings(ns);saveSettingsLS(ns);}));e.target.value='';};
  const upd=(k,v)=>{const ns={...settings,[k]:v};setSettings(ns);saveSettingsLS(ns);};
  const saveAll=()=>{saveSettingsLS(settings);setSettingsSaved(true);setTimeout(()=>setSettingsSaved(false),2000);};
  const saveFooter=async()=>{
    if(!profile?.store_id)return;
    try{
      const current=await sb.from('stores').select('settings').eq('id',profile.store_id).single();
      const merged={...(current.data?.settings||{}),footer:storeFooter};
      await sb.from('stores').update({settings:merged}).eq('id',profile.store_id);
      setFooterSaved(true);setTimeout(()=>setFooterSaved(false),2000);
    }catch(e){console.error('Footer save failed',e);}
  };
  return(
    <div className="screen" style={{padding:16,background:T.bg}}>
      <div style={{...S.card,display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:50,height:50,borderRadius:25,background:T.panel,border:'2px solid '+C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>👤</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:16,color:T.text}}>{profile&&profile.name||'User'}</div>
          <div style={{fontSize:12,color:C.accent,fontWeight:600}}>{profile&&profile.role==='admin'?'Admin':'Worker'}</div>
          <div style={{fontSize:12,color:T.muted}}>{profile&&profile.store&&profile.store.name||''}</div>
        </div>
        <button style={{...S.btnSm(C.red),background:'#fee2e2',color:C.red,border:'1px solid #fca5a5'}} onClick={signOut}>Sign Out</button>
      </div>
      <div style={{...S.card,borderTopColor:C.purple,borderTopWidth:3}}>
        <div style={S.cardTitle}>Anthropic API Key</div>
        <div style={{fontSize:13,color:T.muted,marginBottom:12}}>Get from console.anthropic.com · Syncs to all devices.</div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input style={{...S.input,flex:1}} type={showKey?'text':'password'} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-api03-..."/>
          <button style={{...S.btnSm(T.panel),color:T.muted,border:'1px solid '+T.border,fontSize:16}} onClick={()=>setShowKey(s=>!s)}>{showKey?'Hide':'Show'}</button>
        </div>
        <button style={S.btn()} onClick={saveKey}>{saved?'Saved!':'Save Key'}</button>
      </div>
      <div style={{...S.card,borderTopColor:C.green,borderTopWidth:3}}>
        <div style={S.cardTitle}>📄 Store Listing Footer</div>
        <div style={{fontSize:13,color:T.muted,marginBottom:12,lineHeight:1.6}}>This text is appended to every part description. Synced across all devices and visible in the admin app.</div>
        <textarea style={{...S.textarea,minHeight:140,marginBottom:12,fontSize:13,lineHeight:1.6}} value={storeFooter} onChange={e=>setStoreFooter(e.target.value)} placeholder="e.g. All parts tested. Free returns. Aus Post tracked."/>
        <button style={S.btn(C.green)} onClick={saveFooter}>{footerSaved?'Saved! ✓':'Save Footer'}</button>
      </div>
      <div style={{...S.card,borderTopColor:C.accent,borderTopWidth:3}}>
        <div style={S.cardTitle}>Settings</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,paddingBottom:16,borderBottom:'1px solid '+T.border}}>
          <div><div style={{fontWeight:600,fontSize:14,color:T.text}}>Dark Mode</div></div>
          <button onClick={themeToggle} style={{background:dark?C.accent:T.panel,border:'1px solid '+T.border,borderRadius:20,padding:'6px 16px',color:dark?'#fff':T.text,fontWeight:600,fontSize:13}}>{dark?'On':'Off'}</button>
        </div>
        <label style={S.label}>Default Search Keywords</label>
        <input style={{...S.input,marginBottom:14}} value={settings.defaultKeywords||''} onChange={e=>upd('defaultKeywords',e.target.value)} placeholder="e.g. genuine OEM used spare parts Australia"/>
        <label style={S.label}>Default Text Added to All Descriptions</label>
        <textarea style={{...S.textarea,minHeight:80,marginBottom:14}} value={settings.defaultText||''} onChange={e=>upd('defaultText',e.target.value)} placeholder="e.g. All parts tested. Aus Post tracked."/>
        <label style={S.label}>Site Default Images</label>
        <input ref={siteImgRef} type="file" accept="image/*" multiple onChange={handleSiteImg}/>
        {(settings.siteImages||[]).length>0&&(
          <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
            {(settings.siteImages||[]).map((img,i)=>(
              <div key={i} style={{position:'relative',width:60,height:60}}>
                <img src={img} style={{width:60,height:60,borderRadius:8,objectFit:'cover'}}/>
                <button onClick={()=>upd('siteImages',(settings.siteImages||[]).filter((_,j)=>j!==i))} style={{position:'absolute',top:-6,right:-6,background:C.red,border:'none',color:'#fff',borderRadius:'50%',width:18,height:18,fontSize:10,fontWeight:700,padding:0,lineHeight:'18px'}}>x</button>
              </div>
            ))}
          </div>
        )}
        <button onClick={()=>siteImgRef.current.click()} style={{...S.btn(T.navBg),marginBottom:16,padding:'11px 16px',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>📷 Add Site Image</button>
        <button style={S.btn()} onClick={saveAll}>{settingsSaved?'Saved!':'Save Settings'}</button>
      </div>
      <div style={{textAlign:'center',fontSize:11,color:T.muted,padding:'8px 0 20px'}}>PartVault Mobile v{APP_VERSION}</div>
    </div>
  );
}

// ─── APP ROOT ────────────────────────────────────────────────
function App(){
  const{dark,toggle,T}=useTheme();
  const S=useMemo(()=>makeS(T),[T]);
  const[session,setSession]=useState(null);
  const[profile,setProfile]=useState(null);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState('cars');
  const[openCar,setOpenCar]=useState(null);
  const settings=loadSettings();

  useEffect(()=>{
    const timeout=setTimeout(()=>setLoading(false),8000);
    sb.auth.getSession().then(({data:{session}})=>{clearTimeout(timeout);setSession(session);if(session)loadProfile();else setLoading(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((event,s)=>{
      setSession(s);if(s)loadProfile();else{setProfile(null);setLoading(false);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const loadProfile=async()=>{
    const{data,error}=await sb.rpc('get_my_profile');
    if(!error&&data&&data.length>0){
      const r=data[0];
      setProfile({user_id:r.user_id,store_id:r.store_id,role:r.role,name:r.name,store:{id:r.store_id,name:r.store_name,join_code:r.join_code}});
      // Always load anthropic key from Supabase - single source of truth
      const{data:prof}=await sb.from('profiles').select('anthropic_key').eq('user_id',r.user_id).single();
      if(prof&&prof.anthropic_key){
        localStorage.setItem('pv_anthropic_key',prof.anthropic_key);
      }
    }
    setLoading(false);
  };

  const isAdmin=profile&&profile.role==='admin';
  const userDisplay=()=>{
    if(profile&&profile.name){const parts=profile.name.trim().split(' ');return parts[0]+(parts.length>1?' '+parts[parts.length-1][0]+'.':'');}
    const email=(session&&session.user&&session.user.email)||'';
    return email?email.split('@')[0]:'';
  };

  if(loading)return(<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:T.bg,minHeight:'100vh'}}><span className="spin" style={{fontSize:32}}>⚙</span></div>);
  if(!session)return <AuthScreen T={T} S={S}/>;
  if(openCar)return <CarScreen car={openCar} profile={profile} onHome={()=>setOpenCar(null)} T={T} S={S} settings={settings}/>;

  const TABS=[{id:'cars',icon:'🚗',label:'Cars'},{id:'parts',icon:'📦',label:'Parts'},{id:'history',icon:'📄',label:'CSV'},{id:'account',icon:'👤',label:'Account'}];

  return(
    <div id="root" style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <div style={S.nav}>
        <span style={S.navTitle}>PartVault <span style={{fontSize:9,opacity:0.5,fontWeight:400}}>v{APP_VERSION}</span></span>
        {userDisplay()&&<span style={S.navUser}>{userDisplay()}{profile&&profile.role?' · '+(isAdmin?'Admin':'Worker'):''}</span>}
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',background:T.bg}}>
        {tab==='cars'&&<CarsTab profile={profile} onOpenCar={car=>setOpenCar(car)} T={T} S={S}/>}
        {tab==='parts'&&<PartsTab profile={profile} isAdmin={isAdmin} T={T} S={S}/>}
        {tab==='history'&&<CSVHistoryTab profile={profile} T={T} S={S}/>}
        {tab==='account'&&<AccountTab profile={profile} isAdmin={isAdmin} T={T} S={S} themeToggle={toggle} dark={dark}/>}
      </div>
      <div style={S.tabBar}>
        {TABS.map(t=>(
          <button key={t.id} style={S.tabBtn(tab===t.id)} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span style={S.tabLabel(tab===t.id)}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
