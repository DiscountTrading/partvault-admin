function useSupabaseParts() {
  const [parts, setParts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState('connecting');

  const mapRow = r => ({
    id: r.id, sku: r.sku||'', title: r.title||'', category: r.category||'',
    subcategory: r.subcategory||'', make: r.make||'', model: r.model||'',
    year: r.year||'', condition: r.condition||'Used – Good',
    description: r.description||'', status: r.status||'In Stock',
    costs: r.costs||{acquisition:0,labour:0,storage:0,packaging:0,postage:0,holding:0},
    list_price: +r.list_price||0, soldPrice: r.sold_price ? +r.sold_price : null,
    listPrice: +r.list_price||0,  // alias for compatibility
    weight: r.weight ? +r.weight : null,
    photos: r.photos||[], partNumber: r.part_number||'',
    ebayItemId: r.ebay_item_id||'', shippingOption: r.shipping_option||'Standard Post',
    notes: r.notes||'', acquiredDate: r.acquired_date||null,
    listedDate: r.listed_date||null, soldDate: r.sold_date||null,
    deletedAt: r.deleted_at||null, createdAt: r.created_at,
  });

  const mapToRow = p => ({
    sku: p.sku, title: p.title, category: p.category, subcategory: p.subcategory,
    make: p.make, model: p.model, year: p.year, condition: p.condition,
    description: p.description, status: p.status, costs: p.costs,
    list_price: +p.listPrice||+p.list_price||0,
    sold_price: p.soldPrice ? +p.soldPrice : null,
    weight: p.weight ? +p.weight : null, photos: p.photos||[],
    part_number: p.partNumber||'', ebay_item_id: p.ebayItemId||'',
    shipping_option: p.shippingOption||'Standard Post',
    notes: p.notes||'', acquired_date: p.acquiredDate||null,
    listed_date: p.listedDate||null, sold_date: p.soldDate||null,
    deleted_at: p.deletedAt||null,
  });

  const fetch = useCallback(async () => {
    const { data, error } = await sb.from('parts').select('*').order('created_at', { ascending: false });
    if (!error && data) { setParts(data.map(mapRow)); setSyncStatus('live'); }
    else setSyncStatus('error');
    setLoading(false);
  }, []);

  useEffect(() => {
    fetch();
    const channel = sb.channel('admin-parts')
      .on('postgres_changes', { event:'*', schema:'public', table:'parts' }, fetch)
      .subscribe();
    return () => sb.removeChannel(channel);
  }, [fetch]);

  const addPart = async p => {
    const { data: { user } } = await sb.auth.getUser();
    const { data, error } = await sb.from('parts').insert({ ...mapToRow(p), user_id: user?.id }).select().single();
    if (!error) { setParts(ps => [mapRow(data), ...ps]); return mapRow(data); }
    throw error;
  };

  const editPart = async p => {
    const { error } = await sb.from('parts').update(mapToRow(p)).eq('id', p.id);
    if (!error) setParts(ps => ps.map(x => x.id===p.id ? p : x));
    else throw error;
  };

  const softDelete = async id => {
    const p = parts.find(x=>x.id===id);
    if (p) await editPart({ ...p, status:'Deleted', deletedAt: new Date().toISOString() });
  };

  return { parts, loading, syncStatus, addPart, editPart, softDelete, refetch: fetch };
}

//  AUTH SCREEN
// ═══════════════════════════════════════════════════════════════════════════
function AuthScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [mode, setMode] = useState('login');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handle = async () => {
    if (!email || !password) { setErr('Email and password required.'); return; }
    setLoading(true); setErr('');
    try {
      if (mode==='login') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        setErr('Account created — check your email to verify, then log in.');
        setMode('login');
      }
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  return (
    <div style={{ minHeight:'100vh', background:C.bg, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div style={{ width:'100%', maxWidth:400 }}>
        <div style={{ textAlign:'center', marginBottom:32 }}>
          <div style={{ fontSize:56, marginBottom:8 }}>⚙</div>
          <div style={{ fontSize:28, fontWeight:800, color:C.accent, letterSpacing:-1 }}>PartVault Admin</div>
          <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>Australian Car Parts Manager</div>
        </div>
        <div style={{ ...S.card, borderColor:C.border }}>
          <div style={{ fontSize:18, fontWeight:700, color:C.white, marginBottom:20 }}>
            {mode==='login' ? 'Sign In' : 'Create Account'}
          </div>
          <div style={{ marginBottom:12 }}>
            <label style={S.label}>Email</label>
            <input style={S.input} type="email" value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="your@email.com" onKeyDown={e=>e.key==='Enter'&&handle()} />
          </div>
          <div style={{ marginBottom:16 }}>
            <label style={S.label}>Password</label>
            <input style={S.input} type="password" value={password} onChange={e=>setPassword(e.target.value)}
              placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&handle()} />
          </div>
          {err && <div style={{ fontSize:12, color:err.includes('created')?C.green:C.red, marginBottom:12 }}>{err}</div>}
          <button style={{ ...S.btn(), width:'100%', padding:12, fontSize:14 }} onClick={handle} disabled={loading}>
            {loading ? '⏳ Please wait…' : mode==='login' ? 'Sign In' : 'Create Account'}
          </button>
          <div style={{ textAlign:'center', marginTop:14, fontSize:12, color:C.muted }}>
            {mode==='login' ? "No account? " : "Have an account? "}
            <span style={{ color:C.accent, cursor:'pointer', fontWeight:700 }}
              onClick={()=>{ setMode(m=>m==='login'?'signup':'login'); setErr(''); }}>
              {mode==='login' ? 'Sign Up' : 'Sign In'}
            </span>
          </div>
        </div>
        <div style={{ ...S.card, marginTop:14, fontSize:11, color:C.muted, lineHeight:1.7 }}>
          💡 Same login as the iPhone app — all data syncs in real-time via Supabase.
        </div>
      </div>
    </div>
  );
}

function Dashboard({ parts }) {
  const active = parts.filter(p=>p.status!=='Deleted');
  const inStock = active.filter(p=>p.status==='In Stock');
  const listed  = active.filter(p=>p.status==='Listed');
  const sold    = active.filter(p=>p.status==='Sold');
  const soldRev  = sold.reduce((a,p)=>a+(+p.soldPrice||+p.list_price||0),0);
  const soldCogs = sold.reduce((a,p)=>a+totalCost(p),0);
  const gross    = soldRev - soldCogs;
  const margin   = soldRev>0?(gross/soldRev)*100:0;
  const stockVal = [...inStock,...listed].reduce((a,p)=>a+totalCost(p),0);

  const aged = listed.filter(p=>{
    if (!p.listedDate) return false;
    return Math.floor((Date.now()-new Date(p.listedDate))/86400000)>60;
  });

  const catBreak = CATEGORY_NAMES.map(cat=>({ cat, count:active.filter(p=>p.category===cat).length }))
    .filter(x=>x.count>0).sort((a,b)=>b.count-a.count).slice(0,8);

  return (
    <div>
      <SectionHeader title="📊 Dashboard" />
      <div style={S.g4}>
        <StatCard label="Total Parts"      value={active.length}         sub={`${inStock.length} in stock`} />
        <StatCard label="Listed on eBay"   value={listed.length}         color={C.accent} />
        <StatCard label="Total Sold"       value={sold.length}           color={C.green} sub={fmt(soldRev)+' revenue'} />
        <StatCard label="Gross Profit"     value={fmt(gross)}            color={margin>30?C.green:C.yellow} sub={pct(margin)+' margin'} />
      </div>
      <div style={{ ...S.g2, marginTop:14 }}>
        <div style={S.card}>
          <h2 style={S.h2}>📦 Stock by Category</h2>
          {catBreak.map(({cat,count})=>(

          ))}

          {aged.length===0 && <p style={{ color:C.muted, fontSize:12 }}>No aged stock alerts.</p>}
          {aged.slice(0,6).map(p=>{

            return (
              <div key={p.id} style={{ padding:'6px 0', borderBottom:`1px solid ${C.border}` }}>
                <div style={{ fontSize:12, color:days>90?C.red:C.yellow }}>{p.title}</div>

          <div style={{ marginTop:14, borderTop:`1px solid ${C.border}`, paddingTop:12 }}>
            <div style={{ fontSize:10, color:C.muted, marginBottom:4 }}>INVENTORY VALUE (at cost)</div>

      </div>
      <div style={{ ...S.card, marginTop:14 }}>
        <h2 style={S.h2}>💰 P&L Summary</h2>
        <div style={S.g4}>

            <div key={l}><div style={S.statLbl}>{l}</div><div style={{ fontSize:18, fontWeight:700, color:col }}>{v}</div></div>
          ))}
        </div>
      </div>
    </div>
  );
}

    id:uid(), sku:`SKU-${Date.now().toString().slice(-4)}`,
    title:'', category:defCat, subcategory:EBAY_AU_CATEGORIES[defCat][0],
    make:'', model:'', year:'', condition:PART_CONDITIONS[1],
    description:'', acquiredDate:today(), listedDate:'', soldDate:'',

// ═══════════════════════════════════════════════════════════════════════════
function DeleteModal({ target, onConfirm, onCancel }) {
  const [step, setStep] = useState(1);
  const steps = [
    { h:'Delete this part?', s:`"${target?.title}"`, btn:'Yes, Delete', col:C.yellow },
    { h:'Are you sure?',     s:'This will tag it as Deleted — still recoverable.', btn:"Yes, I'm sure", col:C.red },
    { h:'Really sure?',      s:'Last chance before it is marked deleted.', btn:'Delete It', col:C.red },
  ];
  const st = steps[step-1];
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', zIndex:999, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ ...S.card, maxWidth:380, width:'90%', textAlign:'center', borderColor:C.red+'66' }}>
        <div style={{ fontSize:28, marginBottom:10 }}>{'⚠️'.repeat(step)}</div>
        <div style={{ fontSize:17, fontWeight:700, color:C.white, marginBottom:6 }}>{st.h}</div>
        <div style={{ fontSize:12, color:C.muted, marginBottom:16 }}>{st.s}</div>
        <div style={{ display:'flex', gap:6, justifyContent:'center', marginBottom:18 }}>
          {[1,2,3].map(i=><div key={i} style={{ width:28, height:3, borderRadius:2, background:i<=step?C.red:C.border }} />)}
        </div>
        <div style={{ display:'flex', gap:10, justifyContent:'center' }}>
          <button style={S.btn('secondary')} onClick={onCancel}>Cancel</button>
          <button style={{ ...S.btn('danger'), background:st.col }}
            onClick={()=>step<3?setStep(s=>s+1):onConfirm()}>
            {st.btn}
          </button>
        </div>
      </div>
    </div>
  );
}

//  BULK EDIT PANEL
// ═══════════════════════════════════════════════════════════════════════════
function BulkEditPanel({ selectedIds, parts, onSaveAll, onClose }) {
  const [fields, setFields] = useState({ status:'', condition:'', category:'', subcategory:'', shippingOption:'', costField:'', costType:'flat', costValue:'' });
  const setF=(k,v)=>setFields(f=>({...f,[k]:v}));
  const targets = parts.filter(p=>selectedIds.has(p.id));

  const applyBulk = p => {
    let u = { ...p, costs:{...p.costs} };
    if (fields.status)        u.status = fields.status;
    if (fields.condition)     u.condition = fields.condition;
    if (fields.category)      u.category = fields.category;
    if (fields.subcategory)   u.subcategory = fields.subcategory;
    if (fields.shippingOption) u.shippingOption = fields.shippingOption;
    if (fields.costField && fields.costValue) {
      const k = fields.costField, v = +fields.costValue||0;
      u.costs[k] = fields.costType==='flat' ? v : +(p.costs[k]*(1+v/100)).toFixed(2);
    }
    return u;
  };
  const hasChange = p => JSON.stringify(applyBulk(p)) !== JSON.stringify(p);
  const hasAny = fields.status||fields.condition||fields.category||fields.shippingOption||(fields.costField&&fields.costValue);

  const save = async () => {
    for (const p of targets.filter(hasChange)) { await onSaveAll(applyBulk(p)); }
    onClose();
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', zIndex:998, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ ...S.card, maxWidth:540, width:'95%', maxHeight:'88vh', overflowY:'auto', borderColor:C.blue+'66' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
          <div>
            <div style={{ fontSize:15, fontWeight:700, color:C.white }}>✏️ Bulk Edit</div>
            <div style={{ fontSize:11, color:C.muted }}>{targets.length} parts selected — only filled fields apply</div>
          </div>
          <button style={{ background:'none', border:'none', color:C.muted, fontSize:18, cursor:'pointer' }} onClick={onClose}>✕</button>
        </div>
        <div style={S.g2}>
          <Field label="Set Status">
            <select style={S.select} value={fields.status} onChange={e=>setF('status',e.target.value)}>
              <option value="">— no change —</option>
              {['In Stock','Listed','Sold','Archived'].map(s=><option key={s}>{s}</option>)}
            </select>
          </Field>
          <Field label="Set Condition">
            <select style={S.select} value={fields.condition} onChange={e=>setF('condition',e.target.value)}>
              <option value="">— no change —</option>
              {PART_CONDITIONS.map(s=><option key={s}>{s}</option>)}
            </select>
          </Field>
          <Field label="Set Category">
            <select style={S.select} value={fields.category} onChange={e=>{ setF('category',e.target.value); setF('subcategory',''); }}>
              <option value="">— no change —</option>
              {CATEGORY_NAMES.map(s=><option key={s}>{s}</option>)}
            </select>
          </Field>
          <Field label="Set Shipping">
            <select style={S.select} value={fields.shippingOption} onChange={e=>setF('shippingOption',e.target.value)}>
              <option value="">— no change —</option>
              {AU_SHIPPING.map(s=><option key={s}>{s}</option>)}
            </select>
          </Field>
        </div>
        <div style={{ ...S.card, background:C.panel, marginBottom:14 }}>
          <div style={{ fontSize:11, color:C.muted, textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:10 }}>Cost Adjustment</div>
          <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
            <div style={{ flex:1, minWidth:130 }}>
              <Field label="Cost Field">
                <select style={S.select} value={fields.costField} onChange={e=>setF('costField',e.target.value)}>
                  <option value="">— none —</option>
                  {['acquisition','labour','storage','packaging','postage','holding'].map(k=><option key={k} value={k}>{k}</option>)}
                </select>
              </Field>
            </div>
            <div style={{ flex:1, minWidth:120 }}>
              <Field label="Type">
                <select style={S.select} value={fields.costType} onChange={e=>setF('costType',e.target.value)}>
                  <option value="flat">Set flat ($)</option>
                  <option value="pct">Adjust % (±)</option>
                </select>
              </Field>
            </div>
            <div style={{ flex:1, minWidth:100 }}>
              <Field label={fields.costType==='pct'?'% change':'New value ($)'}>
                <input style={S.input} type="number" value={fields.costValue} onChange={e=>setF('costValue',e.target.value)} placeholder={fields.costType==='pct'?'e.g. 10':'e.g. 8.00'} />
              </Field>
            </div>
          </div>
        </div>
        {hasAny && <div style={{ fontSize:11, color:C.muted, marginBottom:14 }}>
          {targets.filter(hasChange).length} of {targets.length} rows will change
        </div>}
        <div style={{ display:'flex', gap:8, justifyContent:'flex-end' }}>
          <button style={S.btn('secondary')} onClick={onClose}>Cancel</button>
          <button style={S.btn()} onClick={save} disabled={!hasAny}>
            ✓ Save Bulk Changes ({targets.filter(hasChange).length} rows)
          </button>
        </div>
      </div>
    </div>
  );
}

function Cell({ value, onChange, type='text', options, align='left', color, bold, readOnly, rowEditable }) {
  const [draft, setDraft] = useState(value);
  useEffect(()=>setDraft(value),[value]);

  const base = { display:'block', width:'100%', padding:'0 5px', height:30, lineHeight:'30px', boxSizing:'border-box', fontSize:11, fontFamily:"'Courier New',monospace", textAlign:align, color:color||C.text, fontWeight:bold?700:400, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' };

  const commit = v => { const val=type==='number'?(+v||0):v; if(val!==value) onChange(val); };

  if (rowEditable && !readOnly) {
    if (options) return (
      <select value={draft} onChange={e=>{ setDraft(e.target.value); commit(e.target.value); }}
        style={{ ...base, background:'#1a2a1a', border:`1px solid ${C.green}44`, borderRadius:2, outline:'none', cursor:'pointer' }}>
        {options.map(o=><option key={o}>{o}</option>)}
      </select>
    );
    return <input value={draft} type={type==='number'?'number':type==='date'?'date':'text'} step={type==='number'?'0.01':undefined}
      onChange={e=>setDraft(e.target.value)} onBlur={e=>commit(e.target.value)}
      onKeyDown={e=>e.key==='Escape'&&setDraft(value)}
      style={{ ...base, background:'#1a2a1a', border:`1px solid ${C.green}44`, borderRadius:2, outline:'none' }} />;
  }

  const display = type==='number'&&(value||value===0) ? (value===0?<span style={{color:C.border}}>$0</span>:`$${(+value).toFixed(2)}`) : (value||<span style={{color:C.border}}>—</span>);
  return <div title={String(value||'')} style={{ ...base, cursor:readOnly?'default':'text' }}>{display}</div>;
}

function Inventory({ parts, onAdd, onEdit, onDelete }) {
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('All');
  const [filterCat, setFilterCat] = useState('All');
  const [showDeleted, setShowDeleted] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [draft, setDraft] = useState(null);
  const [selected, setSelected] = useState(new Set());
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [showBulk, setShowBulk] = useState(false);

  const filtered = useMemo(()=>parts.filter(p=>{
    if (!showDeleted && p.status==='Deleted') return false;
    if (showDeleted && p.status!=='Deleted') return false;
    const q=search.toLowerCase();
    const mq=!q||p.title.toLowerCase().includes(q)||p.make.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)||(p.partNumber||'').toLowerCase().includes(q);
    const ms=filterStatus==='All'||p.status===filterStatus;
    const mc=filterCat==='All'||p.category===filterCat;
    return mq&&ms&&mc;
  }),[parts,search,filterStatus,filterCat,showDeleted]);

  const startEdit = p => { if(editingId&&editingId!==p.id) commitEdit(); setEditingId(p.id); setDraft({...p,costs:{...p.costs}}); };
  const upDraft = (k,v)=>setDraft(d=>({...d,[k]:v}));
  const upCost  = (k,v)=>setDraft(d=>({...d,costs:{...d.costs,[k]:+v||0}}));
  const commitEdit = async () => { if(draft) { try { await onEdit(draft); } catch(e){} } setEditingId(null); setDraft(null); };
  const cancelEdit = ()=>{ setEditingId(null); setDraft(null); };

  const toggleSel = id=>setSelected(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });
  const toggleAll = ()=>setSelected(selected.size===filtered.length?new Set():new Set(filtered.map(p=>p.id)));
  const deletedCount = parts.filter(p=>p.status==='Deleted').length;

  const totals = filtered.reduce((acc,p)=>{ const c=totalCost(p),pr=(+p.listPrice||+p.list_price||0)-c; return { cost:acc.cost+c, list:acc.list+(+p.listPrice||+p.list_price||0), profit:acc.profit+pr, sold:acc.sold+(+p.soldPrice||0) }; },{cost:0,list:0,profit:0,sold:0});

  const TH=({children,w,align='left'})=>(
    <th style={{ padding:'0 5px', height:32, whiteSpace:'nowrap', textAlign:align, fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.7px', color:C.muted, background:C.panel, borderBottom:`2px solid ${C.accent}44`, borderRight:`1px solid ${C.border}`, minWidth:w||70 }}>{children}</th>
  );
  const TD=({children,w,br=true})=>(
    <td style={{ padding:0, height:30, minWidth:w||70, verticalAlign:'middle', borderBottom:`1px solid ${C.border}`, borderRight:br?`1px solid ${C.border}`:'none', boxSizing:'border-box' }}>{children}</td>
  );

  if (showForm) return <PartForm part={null} onSave={async p=>{await onAdd(p);setShowForm(false);}} onCancel={()=>setShowForm(false)} />;

  return (
    <div>
      {deleteTarget && <DeleteModal target={deleteTarget} onConfirm={async()=>{ if(deleteTarget.ids){[...deleteTarget.ids].forEach(id=>onDelete(id));setSelected(new Set());}else{await onDelete(deleteTarget.id);}setDeleteTarget(null); }} onCancel={()=>setDeleteTarget(null)} />}
      {showBulk && <BulkEditPanel selectedIds={selected} parts={parts} onSaveAll={onEdit} onClose={()=>setShowBulk(false)} />}

      {/* Toolbar */}
      <div style={{ display:'flex', gap:8, marginBottom:10, alignItems:'center', flexWrap:'wrap' }}>
        <h2 style={{ ...S.h1, margin:0 }}>📦 Inventory</h2>
        <div style={{ width:1, height:22, background:C.border }} />
        <button style={S.btn()} onClick={()=>setShowForm(true)}>+ Add Part</button>
        {editingId && <>
          <button style={S.btn('green')} onClick={commitEdit}>✓ Save Row</button>
          <button style={S.btn('secondary')} onClick={cancelEdit}>✕ Cancel</button>
        </>}
        {selected.size>0 && !editingId && <>
          <button style={S.btn('blue')} onClick={()=>setShowBulk(true)}>✏️ Bulk Edit ({selected.size})</button>
          <button style={S.btn('danger')} onClick={()=>setDeleteTarget({ids:selected,title:`${selected.size} parts`})}>🗑 Delete {selected.size}</button>
        </>}
        <div style={{ marginLeft:'auto', display:'flex', gap:8, alignItems:'center', flexWrap:'wrap' }}>
          <input style={{ ...S.input, width:190, height:30 }} placeholder="🔍 Search…" value={search} onChange={e=>setSearch(e.target.value)} />
          {!showDeleted&&<select style={{ ...S.select, width:110, height:30 }} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            {['All','In Stock','Listed','Sold','Archived'].map(s=><option key={s}>{s}</option>)}
          </select>}
          {!showDeleted&&<select style={{ ...S.select, width:180, height:30 }} value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
            <option>All</option>{CATEGORY_NAMES.map(c=><option key={c}>{c}</option>)}
          </select>}

                  <TD w={82}><Cell value={row.status} onChange={v=>upDraft('status',v)} options={['In Stock','Listed','Sold','Archived']} rowEditable={isEditing&&!isDel} color={stCol} bold /></TD>

                  <TD w={72}><Cell value={cost} onChange={()=>{}} type="number" readOnly align="right" color={isDel?C.muted:C.red} bold /></TD>
                  <TD w={78}><Cell value={row.listPrice||row.list_price||''} onChange={v=>upDraft('listPrice',+v||0)} type="number" rowEditable={isEditing} align="right" color={isDel?C.muted:C.white} bold /></TD>
                  <TD w={78}><Cell value={row.soldPrice||''} onChange={v=>upDraft('soldPrice',+v||0)} type="number" rowEditable={isEditing} align="right" color={isDel?C.muted:C.green} /></TD>
                  <TD w={68}><Cell value={pr} onChange={()=>{}} type="number" readOnly align="right" color={isDel?C.muted:pr>=0?C.green:C.red} bold /></TD>
                  <TD w={62}><div style={{ padding:'0 5px', height:30, lineHeight:'30px', fontSize:11, textAlign:'right', fontWeight:700, color:isDel?C.muted:mg>=30?C.green:mg>0?C.yellow:C.red }}>{(row.listPrice||row.list_price)>0?pct(mg):'—'}</div></TD>
                  <TD w={82}><Cell value={row.acquiredDate||''} onChange={v=>upDraft('acquiredDate',v)} type="date" rowEditable={isEditing} color={C.muted} /></TD>

                  <TD w={82}><Cell value={row.soldDate||''} onChange={v=>upDraft('soldDate',v)} type="date" rowEditable={isEditing} color={C.muted} /></TD>
                  <TD w={100}><Cell value={row.partNumber||''} onChange={v=>upDraft('partNumber',v)} rowEditable={isEditing} color={C.muted} /></TD>
                  <TD w={110}><Cell value={row.shippingOption} onChange={v=>upDraft('shippingOption',v)} options={AU_SHIPPING} rowEditable={isEditing} color={C.muted} /></TD>
                  <TD w={56}><div style={{ textAlign:'center', fontSize:10, lineHeight:'30px', color:p.photos?.length>0?C.accent:C.border }}>{p.photos?.length>0?`📷${p.photos.length}`:'—'}</div></TD>
                  <TD w={52} br={false}><div style={{ textAlign:'center' }}>
                    {isDel ? <span style={{ fontSize:9, color:C.red }}>DEL</span>
                           : <button onClick={()=>setDeleteTarget({id:p.id,title:p.title})} style={{ background:'transparent', border:`1px solid ${C.border}`, color:C.red, borderRadius:3, cursor:'pointer', fontSize:12, width:24, height:22, fontFamily:'inherit' }}>🗑</button>}
                  </div></TD>
                </tr>
              );
            })}
            {filtered.length===0&&<tr><td colSpan={30} style={{ padding:'50px 0', textAlign:'center', color:C.muted, fontSize:12 }}>{showDeleted?'No deleted parts.':'No parts found. Click + Add Part to start.'}</td></tr>}
          </tbody>
          {filtered.length>0&&<tfoot>
            <tr style={{ background:C.panel, borderTop:`2px solid ${C.accent}44` }}>
              <td colSpan={12} style={{ padding:'0 8px', height:30, fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', borderRight:`1px solid ${C.border}` }}>TOTALS — {filtered.length} parts</td>
              {[0,1,2,3,4,5].map(i=><td key={i} style={{ borderRight:`1px solid ${C.border}`, height:30 }}/>)}
              <td style={{ padding:'0 5px', height:30, textAlign:'right', fontSize:11, fontWeight:700, color:C.red, borderRight:`1px solid ${C.border}` }}>{fmt(totals.cost)}</td>
              <td style={{ padding:'0 5px', height:30, textAlign:'right', fontSize:11, fontWeight:700, color:C.white, borderRight:`1px solid ${C.border}` }}>{fmt(totals.list)}</td>
              <td style={{ padding:'0 5px', height:30, textAlign:'right', fontSize:11, fontWeight:700, color:C.green, borderRight:`1px solid ${C.border}` }}>{fmt(totals.sold)}</td>
              <td style={{ padding:'0 5px', height:30, textAlign:'right', fontSize:11, fontWeight:700, color:totals.profit>=0?C.green:C.red, borderRight:`1px solid ${C.border}` }}>{fmt(totals.profit)}</td>

              <td colSpan={6}/>

      <div style={{ marginTop:6, fontSize:10, color:C.muted }}>
        💡 Click <strong style={{color:C.accent}}>Edit</strong> to unlock a row · ✓ to save · Switch rows auto-saves · <strong style={{color:C.blue}}>Bulk Edit</strong> for batch changes · 🗑 is a soft-delete (3 confirmations) — recover from Deleted view
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  EBAY EXPORT
// ═══════════════════════════════════════════════════════════════════════════
function EbayExport({ parts }) {
  const [sel, setSel] = useState([]);
  const exportable = parts.filter(p=>p.status==='In Stock'||p.status==='Listed');
  const toggle = id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const toggleAll=()=>setSel(sel.length===exportable.length?[]:exportable.map(p=>p.id));
  const generateCSV=()=>{
    const rows=exportable.filter(p=>sel.includes(p.id));
    const cond={'Used – Excellent':'3000','Used – Good':'3000','Used – Fair':'5000','For Parts Only':'7000','Refurbished':'2500'};
    const headers='Action,SiteID,Currency,StartPrice,BuyItNowPrice,Title,Description,Category,ConditionID,PicURL,Format,Duration,Quantity,ShippingType,ShippingService-1:Option,ShippingService-1:Cost,DispatchTimeMax,ReturnsAcceptedOption,CustomLabel,MPN,Make,Model,Year,SubTitle';
    const body=rows.map(p=>[
      'Add','15','AUD',p.list_price||p.listPrice,'',
      `"${(p.title||'').replace(/"/g,'""')}"`,`"${(p.description||'').replace(/"/g,'""')}"`,
      '179753',cond[p.condition]||'3000',p.photos?.[0]||'',
      'FixedPrice','GTC','1',
      p.shippingOption==='Free Postage'?'Free':'Flat',p.shippingOption,
      p.shippingOption==='Collect Only'||p.shippingOption==='Free Postage'?0:p.costs?.postage||0,
      '1','ReturnsAccepted',p.sku,p.partNumber||'Does Not Apply',p.make,p.model,p.year,
      `"${p.category} > ${p.subcategory||''}"`,
    ].join(',')).join('\n');
    const blob=new Blob([headers+'\n'+body],{type:'text/csv'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ebay_au_listings.csv'; a.click();
  };
  return (
    <div>
      <SectionHeader title="📤 eBay Australia Export" action={<button style={S.btn('green')} onClick={generateCSV} disabled={sel.length===0}>↓ Export {sel.length} CSV</button>} />
      <div style={{ ...S.card, marginBottom:14, background:C.panel, fontSize:12, color:C.muted, lineHeight:1.8 }}>
        <strong style={{color:C.white}}>How to use:</strong> Select parts → Export CSV → In eBay Seller Hub go to Listings → Bulk listing tools → Upload file (File Exchange).
        <span style={{color:C.yellow}}> ⚠ Ensure your eBay payment/shipping/return policies are configured first.</span>
      </div>
      <div style={{ display:'flex', gap:8, marginBottom:10, alignItems:'center' }}>
        <input type="checkbox" checked={sel.length===exportable.length&&exportable.length>0} onChange={toggleAll} />
        <span style={{fontSize:11,color:C.muted}}>Select all ({exportable.length} exportable)</span>
      </div>
      {exportable.map(p=>{
        const cost=totalCost(p);
        return (
          <div key={p.id} style={{ ...S.card, marginBottom:6, display:'flex', alignItems:'center', gap:10, border:`1px solid ${sel.includes(p.id)?C.accent:C.border}` }}>
            <input type="checkbox" checked={sel.includes(p.id)} onChange={()=>toggle(p.id)} />
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:13}}>{p.title}</div>
              <div style={{fontSize:10,color:C.muted}}>{p.sku} · {p.category} › {p.subcategory} · {p.condition}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontWeight:700,color:C.accent}}>{fmt(p.list_price||p.listPrice)}</div>
              <div style={{fontSize:10,color:C.muted}}>Cost: {fmt(cost)}</div>
            </div>
            <span style={S.pill(STATUS_COLORS[p.status]||C.muted)}>{p.status}</span>
          </div>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  REPORTS
// ═══════════════════════════════════════════════════════════════════════════
function Reports({ parts }) {
  const active=parts.filter(p=>p.status!=='Deleted');
  const sold=active.filter(p=>p.status==='Sold'), listed=active.filter(p=>p.status==='Listed'), inStock=active.filter(p=>p.status==='In Stock');
  const totalRev=sold.reduce((a,p)=>a+(+p.soldPrice||0),0), totalCogs=sold.reduce((a,p)=>a+totalCost(p),0);
  const stockVal=[...inStock,...listed].reduce((a,p)=>a+totalCost(p),0);
  const potRev=[...inStock,...listed].reduce((a,p)=>a+(+p.list_price||+p.listPrice||0),0);
  const aged=listed.map(p=>({...p,days:p.listedDate?Math.floor((Date.now()-new Date(p.listedDate))/86400000):0})).sort((a,b)=>b.days-a.days);
  const soldProfit=sold.map(p=>{const cost=totalCost(p),profit=(+p.soldPrice||0)-cost;return {...p,cost,profit,margin:p.soldPrice>0?(profit/+p.soldPrice)*100:0};}).sort((a,b)=>b.profit-a.profit);
  const catPerf=CATEGORY_NAMES.map(cat=>{const cs=sold.filter(p=>p.category===cat),rev=cs.reduce((a,p)=>a+(+p.soldPrice||0),0),cost=cs.reduce((a,p)=>a+totalCost(p),0);return{cat,count:cs.length,rev,profit:rev-cost,margin:rev>0?((rev-cost)/rev)*100:0};}).filter(x=>x.count>0).sort((a,b)=>b.profit-a.profit);
  return (
    <div>
      <SectionHeader title="📋 Reports & Analytics" />
      <div style={S.g4}>
        <StatCard label="Total Revenue"        value={fmt(totalRev)}   color={C.green} />
        <StatCard label="Gross Profit"         value={fmt(totalRev-totalCogs)} color={(totalRev-totalCogs)>0?C.green:C.red} sub={pct(totalRev>0?((totalRev-totalCogs)/totalRev)*100:0)+' margin'} />
        <StatCard label="Stock Value (cost)"   value={fmt(stockVal)}   color={C.blue} />
        <StatCard label="Potential Revenue"    value={fmt(potRev)}     color={C.accent} />
      </div>
      <div style={{ ...S.g2, marginTop:14 }}>
        <div style={S.card}>
          <h2 style={S.h2}>⏱ Aged Stock (Listed)</h2>
          {aged.length===0&&<p style={{color:C.muted,fontSize:12}}>No listed parts.</p>}
          {aged.slice(0,8).map(p=>(
            <div key={p.id} style={{ padding:'6px 0', borderBottom:`1px solid ${C.border}`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div><div style={{fontSize:12}}>{p.title}</div><div style={{fontSize:10,color:C.muted}}>{p.sku} · {p.days} days</div></div>
              <div style={{textAlign:'right'}}><div style={{color:p.days>90?C.red:p.days>60?C.yellow:C.green,fontWeight:700,fontSize:12}}>{p.days}d</div><div style={{fontSize:10,color:C.muted}}>{fmt(p.list_price||p.listPrice)}</div></div>
            </div>
          ))}
        </div>
        <div style={S.card}>
          <h2 style={S.h2}>🏆 Category Performance</h2>
          {catPerf.length===0&&<p style={{color:C.muted,fontSize:12}}>No sold parts yet.</p>}
          {catPerf.map(x=>(
            <div key={x.cat} style={{ padding:'6px 0', borderBottom:`1px solid ${C.border}` }}>
              <div style={{ display:'flex', justifyContent:'space-between' }}><span style={{fontSize:12}}>{x.cat}</span><span style={{color:C.green,fontWeight:700}}>{fmt(x.profit)}</span></div>
              <div style={{ display:'flex', justifyContent:'space-between' }}><span style={{fontSize:10,color:C.muted}}>{x.count} sold · {fmt(x.rev)}</span><span style={{fontSize:10,color:x.margin>30?C.green:C.yellow}}>{pct(x.margin)}</span></div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ ...S.card, marginTop:14 }}>
        <h2 style={S.h2}>💰 Top Parts by Profit</h2>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
          <thead><tr style={{ borderBottom:`1px solid ${C.border}`, color:C.muted, fontSize:10 }}>
            {['Part','Category','Sold','Cost','Profit','Margin','Days to Sell'].map(h=><th key={h} style={{padding:'6px 8px',textAlign:'left'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {soldProfit.slice(0,10).map(p=>{
              const days=p.soldDate&&p.acquiredDate?Math.floor((new Date(p.soldDate)-new Date(p.acquiredDate))/86400000):'—';
              return <tr key={p.id} style={{borderBottom:`1px solid ${C.border}`}}>
                <td style={{padding:'7px 8px'}}><div style={{fontWeight:600,color:C.white}}>{p.title}</div><div style={{fontSize:10,color:C.muted}}>{p.sku}</div></td>
                <td style={{padding:'7px 8px',fontSize:10,color:C.muted}}>{p.category}</td>
                <td style={{padding:'7px 8px'}}>{fmt(p.soldPrice)}</td>
                <td style={{padding:'7px 8px',color:C.red}}>{fmt(p.cost)}</td>
                <td style={{padding:'7px 8px',color:C.green,fontWeight:700}}>{fmt(p.profit)}</td>
                <td style={{padding:'7px 8px',color:p.margin>30?C.green:C.yellow}}>{pct(p.margin)}</td>
                <td style={{padding:'7px 8px',color:C.muted}}>{days}</td>
              </tr>;
            })}
          </tbody>
        </table>
        {soldProfit.length===0&&<p style={{color:C.muted,textAlign:'center',padding:'20px 0',fontSize:12}}>No sold parts yet.</p>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  GROWTH MODEL
// ═══════════════════════════════════════════════════════════════════════════
function GrowthModel() {
  const [g, setG] = useState({ currentRevenue:36000,currentCogs:15000,currentLabour:0,currentStorage:900,currentOther:3600,newLabour:36000,newStorage:9000,newOther:5400,efficiencyGain:25,targetMargin:35,growthYears:3 });
  const set=(k,v)=>setG(g=>({...g,[k]:+v||0}));
  const curFixed=g.currentLabour+g.currentStorage+g.currentOther;
  const curProfit=g.currentRevenue-(g.currentCogs+curFixed);
  const curMargin=g.currentRevenue>0?(curProfit/g.currentRevenue)*100:0;
  const newFixed=g.newLabour+g.newStorage+g.newOther;
  const cogsPct=g.currentRevenue>0?g.currentCogs/g.currentRevenue:0.5;
  const newCogsPct=cogsPct*(1-g.efficiencyGain/100);
  const denom=1-newCogsPct-g.targetMargin/100;
  const reqRev=denom>0?newFixed/denom:0;
  const yoy=reqRev>g.currentRevenue?Math.pow(reqRev/g.currentRevenue,1/g.growthYears)-1:0;
  const forecasts=Array.from({length:g.growthYears},(_,i)=>i+1).map(yr=>({ yr,rev:g.currentRevenue*Math.pow(1+yoy,yr),profit:g.currentRevenue*Math.pow(1+yoy,yr)*(g.targetMargin/100) }));

  return (
    <div>
      <SectionHeader title="📈 Business Growth Forecasting" />
      <div style={S.g2}>
        <div style={S.card}>
          <h2 style={S.h2}>📊 Current State (Annual AUD)</h2>
          {[['Revenue ($)',g.currentRevenue,'currentRevenue'],['COGS ($)',g.currentCogs,'currentCogs'],['Labour ($)',g.currentLabour,'currentLabour'],['Storage / Premises ($)',g.currentStorage,'currentStorage'],['Other Overheads ($)',g.currentOther,'currentOther']].map(([l,v,k])=>(
            <Field key={k} label={l}><input style={S.input} type="number" value={v} onChange={e=>set(k,e.target.value)} /></Field>
          ))}
          <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:10, marginTop:4 }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}><span style={{color:C.muted,fontSize:12}}>Net Profit</span><strong style={{color:curProfit>0?C.green:C.red}}>{fmt(curProfit)}</strong></div>
            <div style={{ display:'flex', justifyContent:'space-between' }}><span style={{color:C.muted,fontSize:12}}>Net Margin</span><strong style={{color:curMargin>20?C.green:C.yellow}}>{pct(curMargin)}</strong></div>
          </div>
        </div>
        <div style={S.card}>
          <h2 style={S.h2}>🚀 Growth Scenario</h2>
          {[['New Annual Labour / Staff ($)',g.newLabour,'newLabour'],['New Annual Storage / Warehouse ($)',g.newStorage,'newStorage'],['New Annual Other Overheads ($)',g.newOther,'newOther']].map(([l,v,k])=>(
            <Field key={k} label={l}><input style={S.input} type="number" value={v} onChange={e=>set(k,e.target.value)} /></Field>
          ))}
          <Field label="Efficiency / COGS Improvement (%)">
            <input style={S.input} type="number" min="0" max="80" value={g.efficiencyGain} onChange={e=>set('efficiencyGain',e.target.value)} />
          </Field>
          <Field label="Target Net Profit Margin (%)"><input style={S.input} type="number" value={g.targetMargin} onChange={e=>set('targetMargin',e.target.value)} /></Field>
          <Field label="Forecast Period (years)"><input style={S.input} type="number" min="1" max="10" value={g.growthYears} onChange={e=>set('growthYears',e.target.value)} /></Field>
        </div>
      </div>
      <div style={{ ...S.card, marginTop:14, borderColor:C.accent }}>
        <h2 style={{ ...S.h2, color:C.accent }}>🎯 What You Need</h2>
        <div style={S.g3}>
          <StatCard label="Required Annual Revenue" value={fmt(reqRev)} color={C.accent} sub="to hit target margin" />
          <StatCard label="Revenue Uplift Needed" value={fmt(Math.max(0,reqRev-g.currentRevenue))} color={C.yellow} sub="above current" />
          <StatCard label="Required YoY Growth" value={pct(yoy*100)} color={C.blue} sub={`over ${g.growthYears} yr${g.growthYears!==1?'s':''}`} />
        </div>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12, marginTop:14 }}>
          <thead><tr style={{ borderBottom:`1px solid ${C.border}`, color:C.muted, fontSize:10, textTransform:'uppercase' }}>
            {['Year','Revenue','COGS (est.)','Fixed Costs','Net Profit','Margin'].map(h=><th key={h} style={{padding:'6px 8px',textAlign:'left'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            <tr style={{ borderBottom:`1px solid ${C.border}`, color:C.muted }}>
              <td style={{padding:'6px 8px'}}>Now</td><td style={{padding:'6px 8px'}}>{fmt(g.currentRevenue)}</td><td style={{padding:'6px 8px'}}>{fmt(g.currentCogs)}</td><td style={{padding:'6px 8px'}}>{fmt(curFixed)}</td><td style={{padding:'6px 8px',color:curProfit>0?C.green:C.red}}>{fmt(curProfit)}</td><td style={{padding:'6px 8px'}}>{pct(curMargin)}</td>
            </tr>
            {forecasts.map(({yr,rev,profit})=>(
              <tr key={yr} style={{ borderBottom:`1px solid ${C.border}` }}>
                <td style={{padding:'6px 8px',color:C.accent,fontWeight:700}}>Year {yr}</td><td style={{padding:'6px 8px',color:C.white,fontWeight:600}}>{fmt(rev)}</td><td style={{padding:'6px 8px',color:C.red}}>{fmt(rev*newCogsPct)}</td><td style={{padding:'6px 8px',color:C.muted}}>{fmt(newFixed)}</td><td style={{padding:'6px 8px',color:C.green,fontWeight:700}}>{fmt(profit)}</td><td style={{padding:'6px 8px',color:C.green}}>{pct(g.targetMargin)}</td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{ marginTop:14, padding:10, background:C.panel, borderRadius:6, border:`1px solid ${C.border}`, fontSize:12, lineHeight:1.8, color:C.muted }}>
          <strong style={{color:C.white}}>💡 Summary: </strong>
          With new fixed costs of <strong style={{color:C.white}}>{fmt(newFixed)}/yr</strong> and a <strong style={{color:C.white}}>{pct(g.efficiencyGain)}</strong> COGS improvement, you need <strong style={{color:C.accent}}>{fmt(reqRev)}</strong>/yr — requiring approx. <strong style={{color:C.blue}}>{pct(yoy*100)}</strong> YoY growth over {g.growthYears} year{g.growthYears!==1?'s':''}.
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════

        Path: <strong style={{color:C.white}}>Vehicle Parts & Accessories › Car & Truck Parts & Accessories</strong> · {CATEGORY_NAMES.length} categories · {Object.values(EBAY_AU_CATEGORIES).reduce((a,v)=>a+v.length,0)} subcategories
      </div>
      <div style={S.g2}>
        <div style={{ ...S.card, padding:0, overflowY:'auto', maxHeight:560 }}>

            <div key={cat} onClick={()=>setSel(cat)}
              style={{ padding:'10px 14px', cursor:'pointer', borderBottom:`1px solid ${C.border}`, background:sel===cat?C.accent+'22':'transparent', borderLeft:sel===cat?`3px solid ${C.accent}`:'3px solid transparent', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontSize:12, color:sel===cat?C.white:C.text }}>{cat}</span>
              <span style={{ fontSize:10, color:C.muted }}>{EBAY_AU_CATEGORIES[cat].length}</span>

        </div>
        <div style={{ ...S.card, overflowY:'auto', maxHeight:560 }}>
          <h2 style={{ ...S.h2, color:C.accent }}>{sel}</h2>
          <div style={{ fontSize:10, color:C.muted, marginBottom:12 }}>{EBAY_AU_CATEGORIES[sel].length} subcategories</div>
          {EBAY_AU_CATEGORIES[sel].map((sub,i)=>(
            <div key={i} style={{ padding:'6px 0', borderBottom:`1px solid ${C.border}`, fontSize:12, display:'flex', gap:8 }}>
              <span style={{ color:C.muted, fontSize:10, minWidth:22 }}>{i+1}.</span>{sub}

}

  const [email, setEmail] = useState('');
  useEffect(()=>{ sb.auth.getUser().then(({data:{user}})=>setEmail(user?.email||'')); },[]);
  return (
    <div style={{ maxWidth:620 }}>
      <SectionHeader title="⚙️ Settings" />
      <div style={S.card}>
        <h2 style={S.h2}>Account</h2>
        <div style={{ fontSize:13, color:C.text, marginBottom:16 }}>Logged in as <strong style={{color:C.accent}}>{email}</strong></div>
        <button style={S.btn('danger')} onClick={onSignOut}>Sign Out</button>
      </div>
      <div style={{ ...S.card, marginTop:14 }}>
        <h2 style={S.h2}>Supabase Connection</h2>
        <div style={{ fontSize:12, color:C.muted, lineHeight:1.8 }}>
          <div>URL: <code style={{color:C.blue}}>{SUPABASE_URL}</code></div>
          <div style={{marginTop:8, color:C.green}}>🟢 Real-time sync active — changes appear on the iPhone app instantly.</div>
        </div>
      </div>
      <div style={{ ...S.card, marginTop:14 }}>
        <h2 style={S.h2}>iPhone App</h2>

          The Expo mobile app connects to the same Supabase database. Any part added or edited here appears on the phone in real-time, and vice versa. See the README.md in the partvault-mobile folder for App Store submission steps.
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
//  APP ROOT
// ═══════════════════════════════════════════════════════════════════════════
const TABS = [
  {id:'dashboard',label:'Dashboard',icon:'📊'},
  {id:'inventory', label:'Inventory', icon:'📦'},
  {id:'categories',label:'Categories',icon:'🗂'},
  {id:'ebay',      label:'eBay Export',icon:'📤'},
  {id:'reports',   label:'Reports',   icon:'📋'},
  {id:'growth',    label:'Growth',    icon:'📈'},
  {id:'settings',  label:'Settings',  icon:'⚙️'},
];

function App() {
  const [session, setSession] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  const [tab, setTab] = useState('dashboard');
  const { parts, loading, syncStatus, addPart, editPart, softDelete, refetch } = useSupabaseParts();
  const [toast, setToast] = useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{ setSession(session); setAuthReady(true); });
    const { data:{subscription} } = sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return ()=>subscription.unsubscribe();
  },[]);

  const showToast=(msg,color=C.green)=>{ setToast({msg,color}); setTimeout(()=>setToast(null),2500); };

  const handleAdd = async p => { try { await addPart(p); showToast('Part added ✓'); } catch(e) { showToast(e.message,C.red); throw e; } };
  const handleEdit= async p => { try { await editPart(p); showToast('Saved ✓'); } catch(e) { showToast(e.message,C.red); throw e; } };
  const handleDel = async id => { try { await softDelete(id); showToast('Deleted ✓',C.red); } catch(e) { showToast(e.message,C.red); } };

  if (!authReady) return <div style={{ minHeight:'100vh', background:C.bg, display:'flex', alignItems:'center', justifyContent:'center', color:C.muted }}>Loading…</div>;
  if (!session) return <AuthScreen />;

  return (
    <div style={S.app}>
      <nav style={S.nav}>
        <div style={S.logo}>⚙ PartVault Admin</div>
        {TABS.map(t=>(
          <button key={t.id} style={S.navBtn(tab===t.id)} onClick={()=>setTab(t.id)}>
            {t.icon} {t.label}
          </button>
        ))}
        <div style={{ marginLeft:'auto', padding:'0 14px', display:'flex', alignItems:'center', gap:8, fontSize:11, color:C.muted }}>
          {loading ? <span className="spin">⏳</span> : null}
          {parts.filter(p=>p.status!=='Deleted').length} parts
          <SyncBadge status={syncStatus} />
          <button style={{ background:'none', border:`1px solid ${C.border}`, color:C.muted, borderRadius:4, padding:'3px 8px', cursor:'pointer', fontSize:10, fontFamily:'inherit' }}
            onClick={refetch}>↻ Refresh</button>
        </div>
      </nav>
      <main style={S.main}>
        {tab==='dashboard'  && <Dashboard   parts={parts} />}
        {tab==='inventory'  && <Inventory   parts={parts} onAdd={handleAdd} onEdit={handleEdit} onDelete={handleDel} />}
        {tab==='categories' && <CategoryBrowser />}
        {tab==='ebay'       && <EbayExport  parts={parts} />}
        {tab==='reports'    && <Reports     parts={parts} />}
        {tab==='growth'     && <GrowthModel />}
        {tab==='settings'   && <Settings    onSignOut={()=>sb.auth.signOut()} />}
      </main>
      {toast && (
        <div style={{ position:'fixed', bottom:20, right:20, background:toast.color, color:'#fff', padding:'10px 18px', borderRadius:6, fontSize:13, fontWeight:700, zIndex:1000, boxShadow:'0 4px 20px rgba(0,0,0,0.5)' }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
